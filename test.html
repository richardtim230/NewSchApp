<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.78">
    <title>OAU ExamGuard | Exam Session</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Flowbite CSS & JS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Quill Editor for Theory -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <!-- OneSignal Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
        try {
            await OneSignal.init({
                appId: "39326914-3a29-4a39-ace7-a9ae2545c93c",
                safari_web_id: "web.onesignal.auto.6836a56b-23bd-4172-b38f-daf17d70b8cc",
                notifyButton: { enable: true },
            });
        } catch (e) {
            console.warn("OneSignal init failed:", e);
        }
    });
    </script>
    <!-- MathJax v3 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['$$','$$'], ['\\[','\\]'], ['\\begin{bmatrix}', '\\end{bmatrix}']],
                packages: {'[+]': ['noerrors']}
            },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --gold: #ffd500;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #f9fafb 50%, #f0f4ff 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            color: var(--primary);
        }

        /* ===== NAVBAR ===== */
        nav {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 244, 255, 0.95) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.08);
        }

        .exam-main-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 255, 0.98) 100%);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.15), 0 0 40px rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            overflow: hidden;
        }

        /* ===== HEADER BAR ===== */
        .exam-header-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #5f72bd 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.25);
            border-bottom: 3px solid rgba(255, 213, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .exam-header-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .exam-header-bar {
            py: 24px;
            px: 32px;
            text-center;
            font-weight: 900;
            tracking-wide: true;
            font-size: 1.5rem;
            letter-spacing: 0.8px;
            position: relative;
            z-index: 1;
        }

        /* ===== INFO SECTION ===== */
        .exam-info-section {
            padding: 32px;
            background: linear-gradient(135deg, rgba(248, 250, 255, 0.5) 0%, rgba(240, 244, 255, 0.5) 100%);
            border-bottom: 2px solid rgba(59, 130, 246, 0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(248, 250, 255, 0.6) 100%);
            padding: 18px 22px;
            border-radius: 14px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.08);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .info-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .info-label {
            font-weight: 700;
            font-size: 0.85rem;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: 0.2px;
        }

        /* ===== TIMER ===== */
        #timer {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffd500;
            border-radius: 16px;
            padding: 20px 28px;
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.3);
            border: 2px solid rgba(255, 213, 0, 0.3);
            text-align: center;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
            position: relative;
            overflow: hidden;
        }

        #timer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: pulse-shine 2s infinite;
        }

        @keyframes pulse-shine {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        #timer.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            animation: pulse-warning 1s infinite;
        }

        #timer.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            animation: pulse-danger 0.5s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes pulse-danger {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0); }
        }

        /* ===== QUESTION AREA ===== */
        #question-area {
            padding: 40px 36px;
            min-height: 500px;
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .question-number-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.15) 100%);
            color: #667eea;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95rem;
            border: 1px solid rgba(102, 126, 234, 0.3);
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.8;
            margin-bottom: 32px;
            word-break: break-word;
            letter-spacing: 0.2px;
        }

        /* ===== OPTIONS ===== */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 32px;
        }

        .option-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(248, 250, 255, 0.6) 100%);
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 14px;
            padding: 20px 22px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .option-card:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.08) 100%);
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(102, 126, 234, 0.2);
        }

        .option-card:hover::before {
            left: 100%;
        }

        .option-card input {
            cursor: pointer;
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }

        .option-card input:checked + span {
            font-weight: 900;
            color: #667eea;
        }

        .option-card.selected {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.15) 100%);
            border-color: #667eea;
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .option-card.selected::after {
            content: '✓';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: #667eea;
            font-weight: 900;
            animation: checkmark 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes checkmark {
            0% {
                transform: translateY(-50%) scale(0) rotate(-45deg);
                opacity: 0;
            }
            100% {
                transform: translateY(-50%) scale(1) rotate(0);
                opacity: 1;
            }
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            font-size: 1.05rem;
            font-weight: 600;
            color: #374151;
        }

        /* ===== NAVIGATION ===== */
        .nav-section {
            display: flex;
            gap: 18px;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            border: 2px solid rgba(59, 130, 246, 0.3);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(248, 250, 255, 0.6) 100%);
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.4px;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.1) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn.submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .nav-btn.submit:hover {
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        /* ===== QUESTION PALETTE ===== */
        .question-palette {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(135deg, rgba(248, 250, 255, 0.8) 0%, rgba(240, 244, 255, 0.6) 100%);
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            max-height: 200px;
            overflow-y: auto;
        }

        .question-palette::-webkit-scrollbar {
            width: 6px;
        }

        .question-palette::-webkit-scrollbar-track {
            background: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
        }

        .question-palette::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.4);
            border-radius: 10px;
        }

        .question-palette::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.6);
        }

        .palette-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            background: white;
            color: #667eea;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .palette-btn:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.1);
        }

        .palette-btn.attempted {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-color: #10b981;
        }

        .palette-btn.current {
            background: linear-gradient(135deg, #ffd500 0%, #f59e0b 100%);
            color: #0f172a;
            border-color: #ffd500;
            box-shadow: 0 6px 20px rgba(255, 213, 0, 0.3);
            font-weight: 900;
        }

        /* ===== MODAL ===== */
        .modal-bg {
            position: fixed;
            z-index: 40;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(248, 250, 255, 0.96) 100%);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(102, 126, 234, 0.25), 0 0 60px rgba(102, 126, 234, 0.1);
            padding: 36px;
            min-width: 320px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(59, 130, 246, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-panel h2 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #667eea;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 0.4px;
        }

        .modal-panel p {
            color: #4b5563;
            line-height: 1.7;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        /* ===== LOADER ===== */
        .loading-spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .nav-section {
                flex-direction: column;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .exam-info-section {
                padding: 24px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            #question-area {
                padding: 24px 16px;
            }

            .question-text {
                font-size: 1.2rem;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .nav-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            #timer {
                font-size: 1.8rem;
                padding: 16px 20px;
            }
        }

        @media (max-width: 480px) {
            .exam-header-bar {
                font-size: 1.1rem;
                padding: 16px 20px;
            }

            .exam-main-card {
                border-radius: 16px;
            }

            .info-label {
                font-size: 0.75rem;
            }

            .info-value {
                font-size: 1rem;
            }

            #timer {
                font-size: 1.5rem;
                padding: 12px 16px;
            }

            .question-text {
                font-size: 1.1rem;
            }

            .question-palette {
                max-height: 120px;
            }

            .palette-btn {
                width: 36px;
                height: 36px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-2 sm:p-4">
    <!-- Navbar -->
    <nav class="w-full shadow-md border-b border-blue-100 bg-white/85 backdrop-blur fixed left-0 top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-16 gap-4">
            <a class="flex items-center gap-2 font-bold text-lg hover:opacity-80 transition" href="index.html">
                <img src="../logo.png" class="h-9 w-9" alt="OAU ExamGuard Logo">
                <span class="text-purple-700">OAU</span>
                <span class="text-yellow-500">ExamGuard</span>
            </a>
            <div class="flex items-center gap-4 text-xs sm:text-sm text-purple-700 font-semibold">
                <span class="hidden sm:inline">📝 <span id="exam-mode-label">Exam</span></span>
                <span class="hidden sm:inline">·</span>
                <span class="hidden sm:inline" id="exam-type-label">Mode</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="w-full flex-1 flex items-center justify-center pt-24 pb-8">
        <div class="exam-main-card max-w-5xl w-full">
            <!-- Header -->
            <div class="exam-header-bar py-8 px-8 text-center font-extrabold text-2xl relative z-10">
                <i class="fas fa-laptop mr-3"></i>
                <span>OAU EXAMGUARD – Exam Session</span>
                <span id="exam-type-indicator" class="ml-4 inline-block"></span>
            </div>

            <!-- Exam Info Section -->
            <div class="exam-info-section">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-user"></i> Full Name
                        </div>
                        <div class="info-value" id="student-name">—</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-book"></i> Subject
                        </div>
                        <div class="info-value" id="exam-subject">—</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-id-card"></i> User ID
                        </div>
                        <div class="info-value" id="student-regnum">—</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">
                            <i class="fas fa-clock"></i> Duration
                        </div>
                        <div class="info-value" id="exam-duration">—</div>
                    </div>
                    <div class="info-item col-span-full sm:col-span-1">
                        <div class="info-label">
                            <i class="fas fa-hourglass-end"></i> Time Remaining
                        </div>
                        <div id="timer" class="relative z-10">00:00:00</div>
                    </div>
                </div>
            </div>

            <!-- Question Area -->
            <div id="question-area" class="min-h-[500px]">
                <div class="text-center py-20">
                    <div class="loading-spinner mx-auto mb-6"></div>
                    <p class="text-purple-700 font-bold text-lg">Loading exam...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Root -->
    <div id="modal-root"></div>

    <!-- Footer -->
    <footer class="w-full bg-gradient-to-r from-slate-900 to-slate-800 text-gray-300 py-6 text-center text-xs sm:text-sm mt-12 rounded-t-2xl shadow-lg border-t border-slate-700">
        <div class="max-w-5xl mx-auto px-4">
            <p class="mb-2">&copy; <span id="year"></span> <strong class="text-white">OAU ExamGuard Nigeria.</strong> Your Exam, Our Priority. ✨</p>
            <p class="text-xs opacity-75">Powered by ExamGuard • Secure CBT Platform</p>
        </div>
    </footer>

    <script>
        // [Include all the original JavaScript code here, but add these enhancements]
        document.getElementById('year').textContent = new Date().getFullYear();

        // Enhanced timer styling
        function updateTimerStyle() {
            const timerEl = document.getElementById('timer');
            const timeText = timerEl.textContent;
            const [hours, mins, secs] = timeText.split(':').map(Number);
            const totalSecs = hours * 3600 + mins * 60 + secs;

            timerEl.classList.remove('warning', 'danger');
            if (totalSecs < 60) {
                timerEl.classList.add('danger');
            } else if (totalSecs < 300) {
                timerEl.classList.add('warning');
            }
        }

        // Call this whenever timer updates
        setInterval(updateTimerStyle, 1000);

        // Smooth question rendering
        function smoothRenderQuestion() {
            const qaElement = document.getElementById('question-area');
            qaElement.style.animation = 'none';
            setTimeout(() => {
                qaElement.style.animation = 'slideInUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
            }, 10);
        }
    </script>
</body>
</html>
