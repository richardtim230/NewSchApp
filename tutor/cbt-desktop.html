<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAU ExamGuard | Computer-Based Test Session</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Flowbite CSS & JS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "39326914-3a29-4a39-ace7-a9ae2545c93c",
          safari_web_id: "web.onesignal.auto.6836a56b-23bd-4172-b38f-daf17d70b8cc",
          notifyButton: {
            enable: true,
          },
        });
      });
    </script>
    <!-- MathJax v3 -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)'], ['$', '$']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          packages: {'[+]': ['noerrors']}
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        },
        svg: { fontCache: 'global' }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: #f0f4f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            overflow: hidden;
        }

        .exam-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #fbbf24 100%);
            color: white;
            padding: 1rem 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 50;
            flex-shrink: 0;
        }

        .navbar-inner {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 800;
            font-size: 1.25rem;
        }

        .navbar-brand img {
            height: 2.5rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .brand-oau {
            color: white;
        }

        .brand-exam {
            background: linear-gradient(135deg, #fbbf24, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-status-group {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.9);
        }

        .navbar-status i {
            color: #fbbf24;
            font-size: 1.1rem;
        }

        /* ===== MAIN CONTENT AREA ===== */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        /* ===== QUESTIONS SIDEBAR (LEFT) ===== */
        .questions-sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 2px solid #f3f4f6;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #1f2937;
        }

        .sidebar-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f3f4f6;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: 900;
            color: #fbbf24;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.4rem;
            font-weight: 600;
        }

        .questions-grid {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            align-content: start;
        }

        .questions-grid::-webkit-scrollbar {
            width: 6px;
        }

        .questions-grid::-webkit-scrollbar-track {
            background: #f3f4f6;
        }

        .questions-grid::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .questions-grid::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .q-button {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            background: #f9fafb;
            color: #4b5563;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .q-button:hover {
            border-color: #fbbf24;
            background: #fffbeb;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
        }

        .q-button.answered {
            background: #d1fae5;
            color: #065f46;
            border-color: #6ee7b7;
            font-weight: 800;
        }

        .q-button.answered:hover {
            background: #a7f3d0;
            border-color: #10b981;
        }

        .q-button.current {
            background: #fbbf24;
            color: #1f2937;
            border-color: #fbbf24;
            font-weight: 900;
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.4);
        }

        .q-button.current:hover {
            background: #fcd34d;
        }

        /* ===== CENTER QUESTION AREA ===== */
        .question-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }

        .question-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .question-content::-webkit-scrollbar {
            width: 8px;
        }

        .question-content::-webkit-scrollbar-track {
            background: #f3f4f6;
        }

        .question-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        .question-content::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f3f4f6;
        }

        .question-number-label {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #6b7280;
        }

        .question-progress {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fbbf24;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f2937;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            flex: 1;
        }

        .option-item {
            display: flex;
            gap: 1.25rem;
            padding: 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 1rem;
            background: #fafbfc;
            cursor: pointer;
            transition: all 0.25s ease;
            align-items: flex-start;
        }

        .option-item:hover {
            border-color: #fbbf24;
            background: #fffbeb;
            transform: translateX(8px);
            box-shadow: 0 6px 16px rgba(251, 191, 36, 0.15);
        }

        .option-item input[type="radio"] {
            width: 1.5rem;
            height: 1.5rem;
            margin-top: 0.2rem;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #fbbf24;
        }

        .option-text {
            font-size: 1rem;
            color: #4b5563;
            line-height: 1.6;
            flex: 1;
            word-break: break-word;
        }

        .option-item input[type="radio"]:checked + .option-text {
            color: #1f2937;
            font-weight: 700;
        }

        .option-item.selected {
            border-color: #fbbf24;
            background: #fffbeb;
            box-shadow: 0 6px 16px rgba(251, 191, 36, 0.2);
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            color: #6b7280;
            padding: 3rem;
        }

        .loading-spinner i {
            font-size: 3rem;
            color: #fbbf24;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== QUESTION FOOTER ===== */
        .question-footer {
            background: #fafbfc;
            border-top: 2px solid #e5e7eb;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        .footer-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-nav {
            padding: 0.75rem 1.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            background: white;
            color: #4b5563;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-nav:hover:not(:disabled) {
            border-color: #fbbf24;
            background: #fffbeb;
            color: #1f2937;
        }

        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        /* ===== RIGHT SIDEBAR (INFO) ===== */
        .info-sidebar {
            width: 260px;
            background: white;
            border-left: 1px solid #e5e7eb;
            padding: 1.25rem;
            overflow-y: auto;
            box-shadow: -2px 0 8px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .info-sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .info-sidebar::-webkit-scrollbar-track {
            background: #f3f4f6;
        }

        .info-sidebar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .info-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .info-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: #1f2937;
            word-break: break-word;
        }

        .subject-badge {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fbbf24;
            padding: 1rem;
            border-radius: 0.9rem;
            text-align: center;
            font-weight: 800;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }

        .timer-box {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-radius: 0.9rem;
            padding: 1.5rem;
            text-align: center;
        }

        .timer-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }

        .timer-display {
            font-size: 2.25rem;
            font-weight: 900;
            color: #fbbf24;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.05em;
        }

        .timer-display.critical {
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ===== MODAL ===== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-box {
            background: white;
            border-radius: 1.25rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #d1d5db;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #9ca3af;
        }

        .modal-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .modal-icon i {
            font-size: 3rem;
        }

        .modal-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 0.75rem;
        }

        .modal-message {
            text-align: center;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .modal-btn-primary {
            background: #fbbf24;
            color: #1f2937;
        }

        .modal-btn-primary:hover {
            background: #fcd34d;
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
        }

        .modal-btn-secondary {
            background: #f3f4f6;
            color: #4b5563;
            border: 2px solid #e5e7eb;
        }

        .modal-btn-secondary:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .questions-sidebar {
                width: 240px;
            }

            .info-sidebar {
                width: 220px;
            }

            .question-content {
                padding: 1.5rem;
            }

            .question-footer {
                padding: 1rem 1.5rem;
                gap: 1rem;
            }

            .navbar-status-group {
                gap: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .questions-sidebar,
            .info-sidebar {
                width: 100%;
                border-right: none;
                border-left: none;
                border-bottom: 1px solid #e5e7eb;
            }

            .info-sidebar {
                border-bottom: none;
                max-height: 200px;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                padding: 1rem;
                gap: 1rem;
            }

            .info-item {
                margin-bottom: 0;
                padding-bottom: 0;
                border-bottom: none;
            }

            .questions-grid {
                grid-template-columns: repeat(5, 1fr);
                max-height: 120px;
            }

            .question-content {
                padding: 1.25rem;
            }

            .question-text {
                font-size: 1rem;
            }

            .options-list {
                gap: 0.75rem;
            }

            .option-item {
                padding: 1rem;
                gap: 1rem;
            }

            .option-text {
                font-size: 0.95rem;
            }

            .question-footer {
                flex-direction: column-reverse;
                align-items: stretch;
                padding: 1rem;
            }

            .footer-buttons {
                width: 100%;
                gap: 0.75rem;
            }

            .btn-nav {
                flex: 1;
                justify-content: center;
                padding: 0.65rem 1rem;
                font-size: 0.9rem;
            }

            .btn-submit {
                width: 100%;
                justify-content: center;
                padding: 0.75rem;
            }

            .navbar-inner {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .navbar-brand {
                font-size: 1.1rem;
            }

            .navbar-brand img {
                height: 2rem;
            }

            .navbar-status-group {
                width: 100%;
                gap: 1rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 0.75rem 1rem;
            }

            .navbar-inner {
                gap: 0.75rem;
            }

            .navbar-brand {
                font-size: 0.95rem;
            }

            .navbar-brand img {
                height: 1.75rem;
            }

            .sidebar-header {
                padding: 1rem;
            }

            .questions-grid {
                grid-template-columns: repeat(4, 1fr);
                padding: 0.75rem;
                gap: 0.5rem;
            }

            .q-button {
                font-size: 0.8rem;
            }

            .question-content {
                padding: 1rem;
            }

            .question-meta {
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 1rem;
            }

            .question-text {
                font-size: 0.95rem;
                margin-bottom: 1.25rem;
            }

            .option-item {
                padding: 0.85rem;
                gap: 0.85rem;
            }

            .option-item input[type="radio"] {
                width: 1.25rem;
                height: 1.25rem;
            }

            .option-text {
                font-size: 0.9rem;
            }

            .timer-display {
                font-size: 1.75rem;
            }

            .modal-box {
                padding: 1.5rem;
                width: 95%;
            }

            .modal-title {
                font-size: 1.25rem;
            }

            .modal-message {
                font-size: 0.9rem;
            }

            .modal-actions {
                flex-direction: column;
            }

            .modal-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="exam-wrapper">
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="navbar-inner">
                <div class="navbar-brand">
                    <img src="../logo.png" alt="OAU ExamGuard">
                    <span><span class="brand-oau">OAU</span> <span class="brand-exam">ExamGuard</span></span>
                </div>
                <div class="navbar-status-group">
                    <div class="navbar-status">
                        <i class="fas fa-laptop"></i>
                        <span>CBT Mode</span>
                    </div>
                    <div class="navbar-status">
                        <i class="fas fa-book-open"></i>
                        <span id="navbar-subject">Loading...</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- LEFT SIDEBAR: Questions Navigation -->
            <div class="questions-sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">Questions</div>
                    <div class="sidebar-stats">
                        <div class="stat">
                            <div class="stat-number" id="answered-count">0</div>
                            <div class="stat-label">Answered</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number" id="remaining-count">0</div>
                            <div class="stat-label">Remaining</div>
                        </div>
                    </div>
                </div>
                <div class="questions-grid" id="question-nav-list"></div>
            </div>

            <!-- CENTER: Question Area -->
            <div class="question-area">
                <div class="question-content" id="question-area">
                    <div class="loading-spinner">
                        <i class="fas fa-circle-notch"></i>
                        <p style="font-weight: 600;">Loading exam...</p>
                    </div>
                </div>
                <div class="question-footer">
                    <div class="footer-buttons">
                        <button class="btn-nav" id="prev-btn" disabled>
                            <i class="fas fa-chevron-left"></i> Previous
                        </button>
                        <button class="btn-nav" id="next-btn" disabled>
                            Next <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <button class="btn-submit" id="submit-btn">
                        <i class="fas fa-paper-plane"></i> Submit
                    </button>
                </div>
            </div>

            <!-- RIGHT SIDEBAR: Exam Info -->
            <div class="info-sidebar">
                <div class="subject-badge" id="exam-subject">Loading...</div>

                <div class="info-item">
                    <div class="info-label">Student Name</div>
                    <div class="info-value" id="student-name">-</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Student ID</div>
                    <div class="info-value" id="student-regnum">-</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Duration</div>
                    <div class="info-value" id="exam-duration">-</div>
                </div>

                <div class="info-item">
                    <div class="timer-box">
                        <div class="timer-label">Time Remaining</div>
                        <div class="timer-display" id="timer">00:00:00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ROOT -->
    <div id="modal-root"></div>

<script>
    const API_BASE = "https://examguide.onrender.com";
    
    // ===== SESSION EXPIRATION CONFIGURATION =====
    const SESSION_INACTIVITY_TIMEOUT = 10000; // 10 seconds in milliseconds
    const SESSION_TIMESTAMP_KEY = 'cbt_session_timestamp';
    const SESSION_ACTIVE_KEY = 'cbt_session_active';

    // ===== KEEP-ALIVE: Refresh backend every 4 minutes =====
    function startKeepAliveInterval() {
        setInterval(async () => {
            try {
                const token = getToken();
                if (token) {
                    await fetch(API_BASE + "/api/auth/me", {
                        headers: { Authorization: "Bearer " + token }
                    });
                    console.log("✓ Keep-alive ping sent");
                }
            } catch (err) {
                console.warn("Keep-alive failed:", err.message);
            }
        }, 4 * 60 * 1000);
    }

    function getToken() { return localStorage.getItem("student_jwt_token"); }
    function getExamAccessCode() { return localStorage.getItem("exam_access_code"); }
    function getExamCourseCode() { return localStorage.getItem("exam_course_code"); }

    // ===== SESSION MANAGEMENT =====
    function initializeSession() {
        const now = Date.now();
        sessionStorage.setItem(SESSION_TIMESTAMP_KEY, now.toString());
        sessionStorage.setItem(SESSION_ACTIVE_KEY, 'true');
        localStorage.setItem(SESSION_TIMESTAMP_KEY, now.toString());
        localStorage.setItem(SESSION_ACTIVE_KEY, 'true');
    }

    function updateSessionTimestamp() {
        const now = Date.now();
        sessionStorage.setItem(SESSION_TIMESTAMP_KEY, now.toString());
        localStorage.setItem(SESSION_TIMESTAMP_KEY, now.toString());
    }

    function isSessionExpired() {
        const sessionTimestamp = parseInt(sessionStorage.getItem(SESSION_TIMESTAMP_KEY)) || 
                                 parseInt(localStorage.getItem(SESSION_TIMESTAMP_KEY)) || 0;
        const now = Date.now();
        const elapsed = now - sessionTimestamp;
        
        console.log(`Session check: Elapsed=${elapsed}ms, Threshold=${SESSION_INACTIVITY_TIMEOUT}ms, Expired=${elapsed > SESSION_INACTIVITY_TIMEOUT}`);
        
        return elapsed > SESSION_INACTIVITY_TIMEOUT;
    }

    function clearExamSession() {
        console.log("⏱️ Session expired! Clearing exam progress...");
        sessionStorage.removeItem('cbt_user_answers');
        sessionStorage.removeItem('cbt_shuffled_questions');
        sessionStorage.removeItem('cbt_exam_info');
        localStorage.removeItem('cbt_user_answers');
        localStorage.removeItem('cbt_shuffled_questions');
        localStorage.removeItem('cbt_exam_info');
        sessionStorage.removeItem(SESSION_TIMESTAMP_KEY);
        sessionStorage.removeItem(SESSION_ACTIVE_KEY);
        localStorage.removeItem(SESSION_TIMESTAMP_KEY);
        localStorage.removeItem(SESSION_ACTIVE_KEY);
    }

    function clearOnlySessionProgress() {
        // Clear only exam progress, keep report data intact
        console.log("Clearing only session progress data...");
        sessionStorage.removeItem('cbt_user_answers');
        sessionStorage.removeItem('cbt_shuffled_questions');
        localStorage.removeItem('cbt_user_answers');
        localStorage.removeItem('cbt_shuffled_questions');
    }

    // ===== CHECK FOR PAGE RELOAD/REFRESH =====
    if (performance.navigation && performance.navigation.type === 1) {
        // Page was reloaded
        if (isSessionExpired()) {
            console.log("Page reloaded after inactivity timeout");
            clearExamSession();
            location.replace(location.pathname + location.search);
        } else {
            console.log("Page reloaded within timeout window, resuming session");
            updateSessionTimestamp();
        }
    } else {
        // Fresh page load
        initializeSession();
    }

    function shuffleArray(arr) {
        arr = arr.slice();
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function normalizeQuestionMath(html) {
        if (!html || typeof html !== 'string') return html;
        let s = html.replace(/\\\\/g, '\\');
        if (/\\\(|\\\[|\$\$?/.test(s)) return s;
        const cmdRegex = /\\(?:frac|sqrt|sum|int|lim|left|right|cdot|times|pi|alpha|beta|gamma|theta|log|ln)(?:\{[^}]*\}|\^[^{\s]+|\_[^{\s]+)*/g;
        s = s.replace(cmdRegex, m => `\\(${m}\\)`);
        const expRegex = /([A-Za-z0-9])\^(?:\{[^}]+\}|\d+)/g;
        s = s.replace(expRegex, m => `\\(${m}\\)`);
        const subRegex = /([A-Za-z0-9])_(?:\{[^}]+\}|\d+)/g;
        s = s.replace(subRegex, m => `\\(${m}\\)`);
        return s;
    }

    async function fetchStudentProfile() {
        try {
            const res = await fetch(API_BASE + "/api/auth/me", {
                headers: { Authorization: "Bearer " + getToken() }
            });
            if (!res.ok) throw new Error("Not authenticated");
            return await res.json();
        } catch (err) { return null; }
    }

    async function fetchExamDataByAccessCode(accessCode) {
        try {
            const res = await fetch(API_BASE + `/api/exam-set/by-access?accessCode=${encodeURIComponent(accessCode)}`);
            if (!res.ok) throw new Error("Not found");
            return await res.json();
        } catch (err) { return null; }
    }

    let userAnswers = {};
    let examData = null, studentData = null, currentQ = 0, timer = null, duration = 0, courseCode = "";
    let questionIdMap = {}; // Maps question index to question ID for reliable lookup

    function showModal(message, opts = {}) {
        const root = document.getElementById('modal-root');
        const iconClass = opts.iconClass || 'fa-info-circle';
        const iconColor = opts.iconColor || '#fbbf24';

        root.innerHTML = `
            <div class="modal-backdrop">
                <div class="modal-box">
                    <button class="modal-close" id="close-modal-btn">
                        <i class="fas fa-times"></i>
                    </button>
                    ${(opts.icon !== false) ? `
                        <div class="modal-icon">
                            <i class="fas ${iconClass}" style="color: ${iconColor};"></i>
                        </div>
                    ` : ""}
                    <div class="modal-title">${opts.title || "Notice"}</div>
                    <div class="modal-message">${message}</div>
                    <div class="modal-actions">
                        ${(opts.actionText) ? `<button id="modal-action-btn" class="modal-btn modal-btn-primary">${opts.actionText}</button>` : ""}
                        <button id="modal-close-btn" class="modal-btn modal-btn-secondary">Close</button>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('close-modal-btn').onclick = () => root.innerHTML = "";
        document.getElementById('modal-close-btn').onclick = () => root.innerHTML = "";

        if (opts.onAction && document.getElementById('modal-action-btn')) {
            document.getElementById('modal-action-btn').onclick = () => {
                root.innerHTML = "";
                opts.onAction();
            };
        }
    }

    function persistUserAnswers() {
        sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
        localStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
        updateSessionTimestamp(); // Update timestamp on each answer save
        console.log("Answers persisted:", userAnswers);
    }

    function updateStats() {
        const total = examData.questions.length;
        const answered = Object.keys(userAnswers).filter(k => userAnswers[k]).length;
        document.getElementById('answered-count').textContent = answered;
        document.getElementById('remaining-count').textContent = total - answered;
    }

    // ===== INACTIVITY DETECTION =====
    function setupInactivityWarning() {
        let warningShown = false;
        let warningTimeout = null;

        function resetInactivityTimer() {
            updateSessionTimestamp();
            if (warningShown) {
                warningShown = false;
                const root = document.getElementById('modal-root');
                if (root) root.innerHTML = "";
                console.log("User activity detected, session resumed");
            }
        }

        // Track user activity
        document.addEventListener('click', resetInactivityTimer);
        document.addEventListener('keypress', resetInactivityTimer);
        document.addEventListener('mousemove', resetInactivityTimer);
        document.addEventListener('scroll', resetInactivityTimer);

        // Check for inactivity periodically
        setInterval(() => {
            if (isSessionExpired() && !warningShown) {
                warningShown = true;
                console.log("Session expired due to inactivity");
                showModal(
                    "Your exam session has expired due to inactivity. Your progress will be lost if you continue. Please refresh the page to start a new test.",
                    {
                        title: "Session Expired",
                        iconClass: "fa-clock",
                        iconColor: "#ef4444",
                        actionText: "Refresh Page",
                        onAction: () => {
                            clearOnlySessionProgress();
                            location.reload();
                        }
                    }
                );
            }
        }, 2000); // Check every 2 seconds
    }

    async function main() {
        // Check if session is still valid
        if (isSessionExpired()) {
            console.log("Session expired on page load, clearing data");
            clearExamSession();
        }

        initializeSession();
        startKeepAliveInterval();
        setupInactivityWarning();

        const accessCode = getExamAccessCode();
        courseCode = getExamCourseCode() || "";

        if (!accessCode) {
            showModal("You must enter an exam access code before writing a test.", {
                title: "No Access Code",
                iconClass: "fa-lock",
                iconColor: "#ef4444",
                actionText: "Go to Access",
                onAction: () => { window.location.href = "mock.html"; }
            });
            return;
        }

        studentData = await fetchStudentProfile();
        if (!studentData) {
            showModal("Session expired, please login and try again.", {
                title: "Session Expired",
                iconClass: "fa-clock",
                iconColor: "#f97316",
                actionText: "Go to Login",
                onAction: () => { window.location.href = "mock.html"; }
            });
            return;
        }

        document.getElementById('student-name').innerText = studentData.user.fullName || studentData.user.fullname || studentData.user.name || "(No Name)";
        document.getElementById('student-regnum').innerText = studentData.user.studentId || studentData.user.username || "(No Student ID)";

        const result = await fetchExamDataByAccessCode(accessCode);
        if (!result || !result.examSet || !Array.isArray(result.questions)) {
            showModal("Invalid or expired access code. Please re-enter.", {
                title: "Invalid Access Code",
                iconClass: "fa-exclamation-triangle",
                iconColor: "#ef4444",
                actionText: "Go to Access",
                onAction: () => {
                    localStorage.removeItem("exam_access_code");
                    window.location.href = "mock.html";
                }
            });
            return;
        }

        let shuffleSession = sessionStorage.getItem('cbt_shuffled_questions');
        if (shuffleSession) {
            examData = JSON.parse(shuffleSession);
        } else {
            let shuffledQuestions = shuffleArray(result.questions).map((q) => ({
                ...q,
                options: shuffleArray((q.options || []).map(opt => ({ ...opt }))),
                id: q._id || (Math.random().toString(36).slice(2, 12)),
            }));
            examData = {
                subject: result.examSet.subject,
                duration: result.examSet.duration || 3600,
                questions: shuffledQuestions
            };
            sessionStorage.setItem('cbt_shuffled_questions', JSON.stringify(examData));
        }

        // Build question ID map for reliable lookup in report
        examData.questions.forEach((q, idx) => {
            questionIdMap[idx] = q.id;
        });

        document.getElementById('exam-subject').innerText = examData.subject || courseCode;
        document.getElementById('navbar-subject').innerText = examData.subject || courseCode;
        document.getElementById('exam-duration').innerText = (examData.duration ? Math.round(examData.duration / 60) + " mins" : '');

        const storedAnswers = sessionStorage.getItem('cbt_user_answers');
        if (storedAnswers) userAnswers = JSON.parse(storedAnswers);

        duration = examData.duration || 3600;
        startTimer(duration);
        renderQuestion(currentQ);
    }

    function renderQuestion(idx) {
        const qa = document.getElementById("question-area");
        if (!examData || !examData.questions || idx >= examData.questions.length) {
            qa.innerHTML = '<div class="loading-spinner"><i class="fas fa-exclamation-circle" style="color: #ef4444;"></i><p>No Question Found.</p></div>';
            return;
        }

        const total = examData.questions.length;
        const q = examData.questions[idx];
        const savedAnswer = userAnswers[q.id] || "";
        const questionHtml = normalizeQuestionMath(q.question || '');

        qa.innerHTML = `
            <div class="question-meta">
                <div>
                    <div class="question-number-label">Question ${idx + 1}</div>
                    <div class="question-progress">${idx + 1} of ${total}</div>
                </div>
            </div>
            <div class="question-text">${questionHtml}</div>
            <div class="options-list">
                ${(q.options || []).map((opt, i) => {
                    const label = String.fromCharCode(65 + i);
                    const optHtml = normalizeQuestionMath(opt.text || '');
                    const isChecked = savedAnswer === opt.key;
                    return `
                        <label class="option-item ${isChecked ? 'selected' : ''}">
                            <input type="radio" name="qSelect" value="${opt.key}" ${isChecked ? 'checked' : ''} />
                            <span class="option-text"><strong>${label}.</strong> ${optHtml}</span>
                        </label>
                    `;
                }).join('')}
            </div>
        `;

        const pallet = document.getElementById("question-nav-list");
        let navHtml = "";
        for (let j = 0; j < total; j++) {
            const navId = examData.questions[j].id;
            const attempted = !!userAnswers[navId];
            const curr = j === idx;
            const navClass = curr ? "current" : (attempted ? "answered" : "");
            navHtml += `
                <a href="#" data-qp="${j}" class="q-button ${navClass}" ${curr ? 'aria-current="page"' : ''}>
                    ${j + 1}
                </a>
            `;
        }
        pallet.innerHTML = navHtml;

        updateStats();

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([qa]).catch(err => {
                console.warn("MathJax error:", err && err.message);
            });
        }

        document.querySelectorAll('input[name="qSelect"]').forEach(input => {
            input.onchange = function() {
                userAnswers[q.id] = this.value;
                persistUserAnswers();
                renderQuestion(idx);
            };
        });

        document.getElementById("prev-btn").disabled = idx === 0;
        document.getElementById("next-btn").disabled = idx === total - 1;

        document.getElementById("prev-btn").onclick = (e) => {
            e.preventDefault();
            if (currentQ > 0) {
                currentQ--;
                renderQuestion(currentQ);
            }
        };

        document.getElementById("next-btn").onclick = (e) => {
            e.preventDefault();
            if (currentQ < total - 1) {
                currentQ++;
                renderQuestion(currentQ);
            }
        };

        pallet.querySelectorAll('a[data-qp]').forEach(a => {
            a.onclick = (ev) => {
                ev.preventDefault();
                currentQ = parseInt(a.getAttribute('data-qp'));
                renderQuestion(currentQ);
            };
        });

        document.getElementById("submit-btn").onclick = (e) => {
            e.preventDefault();
            showModal("Are you sure you want to submit your answers and end the test? This action cannot be undone.", {
                title: "Submit Exam",
                iconClass: "fa-question-circle",
                iconColor: "#fbbf24",
                actionText: "Yes, Submit",
                onAction: () => {
                    persistUserAnswers();
                    
                    // Enhanced data structure for report page
                    const examInfoToSave = {
                        subject: examData.subject,
                        matric: document.getElementById('student-regnum').innerText,
                        student: (studentData.user.fullName || studentData.user.fullname || studentData.user.name || ''),
                        course: courseCode,
                        timeCompleted: new Date().toISOString(),
                        type: 'cbt',
                        questions: examData.questions.map(q => ({
                            id: q.id,
                            _id: q._id,
                            question: q.question,
                            options: q.options,
                            correctAnswer: q.correctAnswer
                        }))
                    };
                    
                    sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
                    localStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
                    sessionStorage.setItem('cbt_exam_info', JSON.stringify(examInfoToSave));
                    localStorage.setItem('cbt_exam_info', JSON.stringify(examInfoToSave));
                    sessionStorage.removeItem('cbt_shuffled_questions');
                    
                    // Clear inactivity timers so they don't interfere with report
                    clearOnlySessionProgress();
                    
                    console.log("Exam submitted with data:", {
                        answers: userAnswers,
                        examInfo: examInfoToSave
                    });
                    
                    window.location.href = "results-summary";
                }
            });
        };
    }

    function startTimer(secs) {
        let remaining = secs;
        const timerElem = document.getElementById('timer');

        function update() {
            const hours = Math.floor(remaining / 3600);
            const minutes = Math.floor((remaining % 3600) / 60);
            const seconds = remaining % 60;
            timerElem.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (remaining <= 300) {
                timerElem.classList.add('critical');
            } else {
                timerElem.classList.remove('critical');
            }
        }

        update();
        if (timer) clearInterval(timer);

        timer = setInterval(() => {
            remaining--;
            update();
            if (remaining <= 0) {
                clearInterval(timer);
                timerElem.textContent = "00:00:00";
                showModal("Time has expired! Your exam has been automatically submitted.", {
                    title: "Time Up",
                    iconClass: "fa-hourglass-end",
                    iconColor: "#ef4444",
                    actionText: "View Results",
                    onAction: () => {
                        persistUserAnswers();
                        
                        const examInfoToSave = {
                            subject: examData.subject,
                            matric: document.getElementById('student-regnum').innerText,
                            student: (studentData.user.fullName || studentData.user.fullname || studentData.user.name || ''),
                            course: courseCode,
                            timeCompleted: new Date().toISOString(),
                            type: 'cbt',
                            questions: examData.questions.map(q => ({
                                id: q.id,
                                _id: q._id,
                                question: q.question,
                                options: q.options,
                                correctAnswer: q.correctAnswer
                            }))
                        };
                        
                        sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
                        localStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
                        sessionStorage.setItem('cbt_exam_info', JSON.stringify(examInfoToSave));
                        localStorage.setItem('cbt_exam_info', JSON.stringify(examInfoToSave));
                        sessionStorage.removeItem('cbt_shuffled_questions');
                        
                        clearOnlySessionProgress();
                        
                        window.location.href = "results-summary";
                    }
                });
            }
        }, 1000);
    }

    window.addEventListener("DOMContentLoaded", main);
</script>
</body>
</html>
