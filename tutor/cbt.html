    // Detect device type and redirect if on desktop
    function detectDeviceAndRedirect() {
        const isDesktop = window.innerWidth >= 1024; // Tailwind's lg breakpoint
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // If desktop (not mobile), redirect to desktop version
        if (isDesktop && !isMobile) {
            // Check if we're not already on the desktop page
            if (!window.location.pathname.includes('desktop') && !window.location.pathname.includes('cbt-desktop')) {
                window.location.href = 'exam-in-sessions'; // or your desktop page URL
            }
        }
        // If mobile, stay on current page (cbt.html)
    }
    
    // Run on page load
    window.addEventListener('DOMContentLoaded', function() {
        detectDeviceAndRedirect();
    });
    
    // Also check on resize (in case user rotates device or resizes window)
    window.addEventListener('resize', function() {
        // Optional: only redirect once to avoid annoying redirects
        // Remove this if you want it to redirect on every resize
    });
</script>

<script>
    "use strict";

    const API_BASE = "https://examguide.onrender.com";
    const DEVICE_CHECK_INTERVAL = 5000;
    let deviceCheckTimer = null;
    let hasRedirected = false;

    // ============ LOCAL STORAGE KEYS ============
const LS_KEYS = {
    ANSWERS: 'cbt_user_answers',
    SHUFFLED_QUESTIONS: 'cbt_shuffled_questions',
    EXAM_INFO: 'cbt_exam_info',
    ATTEMPT_ID: 'cbt_attempt_id',
    EXAM_DATA: 'cbt_exam_data',
    CURRENT_QUESTION: 'cbt_current_question',
    START_TIME: 'cbt_start_time',
    IMAGE_ANSWERS: 'cbt_image_answers',
    EXAM_ID: 'cbt_exam_id'  // ADD THIS
};
const SESSION_TIMEOUT = 10000; // 10 seconds in milliseconds
const LS_KEYS_SESSION = {
    ...LS_KEYS,
    SESSION_TIMESTAMP: 'cbt_session_timestamp'
};

function saveSessionTimestamp() {
    saveToLS(LS_KEYS_SESSION.SESSION_TIMESTAMP, Date.now());
}

function isSessionValid() {
    const savedTimestamp = getFromLS(LS_KEYS_SESSION.SESSION_TIMESTAMP);
    if (!savedTimestamp) return false;
    
    const currentTime = Date.now();
    const sessionAge = currentTime - savedTimestamp;
    
    console.log(`Session age: ${sessionAge}ms (timeout: ${SESSION_TIMEOUT}ms)`);
    return sessionAge < SESSION_TIMEOUT;
}

function clearSessionButKeepReport() {
    removeFromLS(LS_KEYS.ANSWERS);
    removeFromLS(LS_KEYS.CURRENT_QUESTION);
    removeFromLS(LS_KEYS.SHUFFLED_QUESTIONS);
    removeFromLS(LS_KEYS.IMAGE_ANSWERS);
    removeFromLS(LS_KEYS.START_TIME);
    removeFromLS(LS_KEYS.EXAM_ID);  // ADD THIS
    removeFromLS(LS_KEYS_SESSION.SESSION_TIMESTAMP);
    
    console.log("✓ Session cleared (report data preserved)");
}
    // ============ DEVICE DETECTION & REDIRECT ============
    function detectDeviceType() {
        const userAgent = navigator.userAgent;
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent);
        const isTablet = /iPad|Android/.test(userAgent) && !/Mobile/.test(userAgent);
        return {
            isMobile: isMobile || isTablet,
            screenWidth: window.innerWidth,
            isDesktopSize: window.innerWidth >= 1024
        };
    }

    function performDeviceRedirect() {
        if (hasRedirected) return;

        const device = detectDeviceType();
        const currentPath = window.location.pathname;
        const isCBTMobilePage = currentPath.includes('cbt.html');
        const isDesktopPage = currentPath.includes('desktop') || currentPath.includes('cbt-desktop');

        if (isCBTMobilePage && device.isDesktopSize && !device.isMobile && !isDesktopPage) {
            hasRedirected = true;
            console.log("Redirecting to desktop exam page...");
            window.location.href = 'exam-in-sessions';
            return;
        }

        if (isDesktopPage && (device.isMobile || !device.isDesktopSize)) {
            hasRedirected = true;
            console.log("Redirecting to mobile exam page...");
            window.location.href = 'cbt.html';
            return;
        }
    }

    window.addEventListener('load', performDeviceRedirect);
    let resizeTimeout;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(performDeviceRedirect, 500);
    });

    function startDeviceCheckInterval() {
        deviceCheckTimer = setInterval(performDeviceRedirect, DEVICE_CHECK_INTERVAL);
    }

    function stopDeviceCheckInterval() {
        if (deviceCheckTimer) {
            clearInterval(deviceCheckTimer);
            deviceCheckTimer = null;
        }
    }

    // ============ LOCAL STORAGE UTILITIES ============
    function saveToLS(key, data) {
        try {
            localStorage.setItem(key, typeof data === 'string' ? data : JSON.stringify(data));
            console.log(`✓ Saved to LS: ${key}`);
        } catch (err) {
            console.warn(`Failed to save ${key}:`, err);
        }
    }

    function getFromLS(key) {
        try {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : null;
        } catch (err) {
            console.warn(`Failed to parse ${key}:`, err);
            return null;
        }
    }

    function removeFromLS(key) {
        try {
            localStorage.removeItem(key);
        } catch (err) {
            console.warn(`Failed to remove ${key}:`, err);
        }
    }

    function clearExamLS() {
        Object.values(LS_KEYS).forEach(key => removeFromLS(key));
    }

    // ============ KEEP-ALIVE: Refresh backend every 4 minutes =====
    let keepAliveTimer = null;
    function startKeepAliveInterval() {
        stopKeepAliveInterval();
        keepAliveTimer = setInterval(async () => {
            try {
                const token = getToken();
                if (token) {
                    await fetch(API_BASE + "/api/auth/me", {
                        headers: { Authorization: "Bearer " + token }
                    });
                    console.log("✓ Keep-alive ping sent");
                }
            } catch (err) {
                console.warn("Keep-alive failed:", err.message);
            }
        }, 4 * 60 * 1000);
    }

    function stopKeepAliveInterval() {
        if (keepAliveTimer) {
            clearInterval(keepAliveTimer);
            keepAliveTimer = null;
        }
    }

    // ============ UTILITY FUNCTIONS ============
    function getToken() {
        return localStorage.getItem("student_jwt_token") || "";
    }

    function getExamAccessCode() {
        return localStorage.getItem("exam_access_code") || "";
    }

    function getExamCourseCode() {
        return localStorage.getItem("exam_course_code") || "";
    }

    // Reset session after reload guard
    if (performance.navigation && performance.navigation.type === 1) {
        clearExamLS();
        location.replace(location.pathname + location.search);
    }

    // Fisher-Yates shuffle
    function shuffleArray(arr) {
        arr = arr.slice();
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Normalize question/option HTML for MathJax
    function normalizeQuestionMath(html) {
        if (!html || typeof html !== 'string') return html;
        let s = html.replace(/\\\\/g, '\\');
        if (/\\\(|\\\[|\$\$?/.test(s)) return s;
        const cmdRegex = /\\(?:frac|sqrt|sum|int|lim|left|right|cdot|times|pi|alpha|beta|gamma|theta|log|ln)(?:\{[^}]*\}|\^[^{\s]+|\_[^{\s]+)*/g;
        s = s.replace(cmdRegex, function(m) { return `\\(${m}\\)`; });
        const expRegex = /([A-Za-z0-9])\^(?:\{[^}]+\}|\d+)/g;
        s = s.replace(expRegex, function(m) { return `\\(${m}\\)`; });
        const subRegex = /([A-Za-z0-9])_(?:\{[^}]+\}|\d+)/g;
        s = s.replace(subRegex, function(m) { return `\\(${m}\\)`; });
        return s;
    }

    // Strip HTML tags
    function stripHtml(html) {
        const tmp = document.createElement("DIV");
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || "";
    }

    // ============ API CALLS ============
    async function fetchStudentProfile() {
        try {
            const token = getToken();
            if (!token) throw new Error("No token");
            const res = await fetch(API_BASE + "/api/auth/me", {
                headers: { Authorization: "Bearer " + token }
            });
            if (!res.ok) throw new Error("Not authenticated");
            return await res.json();
        } catch (err) {
            console.error("Profile fetch error:", err);
            return null;
        }
    }

    async function fetchExamDataByAccessCode(accessCode) {
        try {
            if (!accessCode) throw new Error("No access code");
            const res = await fetch(API_BASE + `/api/exam-set/by-access?accessCode=${encodeURIComponent(accessCode)}`);
            if (!res.ok) throw new Error("Exam not found");
            return await res.json();
        } catch (err) {
            console.error("Exam fetch error:", err);
            return null;
        }
    }

    async function fetchCBTQuestions(examSetId) {
        try {
            if (!examSetId) throw new Error("No exam set ID");
            const res = await fetch(API_BASE + `/api/cbt-questions?examSet=${encodeURIComponent(examSetId)}`);
            if (!res.ok) throw new Error("Not found");
            return await res.json();
        } catch (err) {
            console.error("CBT questions fetch error:", err);
            return [];
        }
    }

    async function fetchTheoryQuestions(examSetId) {
        try {
            if (!examSetId) throw new Error("No exam set ID");
            const res = await fetch(API_BASE + `/api/theory-questions?examSet=${encodeURIComponent(examSetId)}`);
            if (!res.ok) throw new Error("Not found");
            return await res.json();
        } catch (err) {
            console.error("Theory questions fetch error:", err);
            return [];
        }
    }

    async function determineExamType(examSetId) {
        try {
            const [cbtQs, theoryQs] = await Promise.all([
                fetchCBTQuestions(examSetId),
                fetchTheoryQuestions(examSetId)
            ]);
            
            const cbtCount = Array.isArray(cbtQs) ? cbtQs.length : 0;
            const theoryCount = Array.isArray(theoryQs) ? theoryQs.length : 0;
            
            if (cbtCount > 0 && theoryCount > 0) return { type: 'hybrid', cbtQs, theoryQs };
            if (theoryCount > 0) return { type: 'theory', theoryQs };
            return { type: 'cbt', cbtQs };
        } catch (err) {
            console.error("Determine exam type error:", err);
            return { type: 'cbt', cbtQs: [] };
        }
    }

    async function initTheoryAttempt(examSetId) {
        try {
            if (!examSetId) throw new Error("No exam set ID");
            const token = getToken();
            const res = await fetch(API_BASE + "/api/theory-answers/attempt/start", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ examSet: examSetId })
            });
            if (!res.ok) throw new Error("Failed to start attempt");
            return await res.json();
        } catch (err) {
            console.error("Init theory attempt error:", err);
            return null;
        }
    }

                answerImageUrl: answerType === "image" ? answerData : ""
            };
            const res = await fetch(API_BASE + "/api/theory-answers", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error("Submit failed");
            return await res.json();
        } catch (err) {
            console.error("Submit answer error:", err);
            return null;
        }
    }

            });

// ============ RESTORE FROM LS ============
function restoreExamData() {
    // Check if this is a NEW exam session (different from last one)
    const storedExamId = getFromLS(LS_KEYS.EXAM_ID);
    if (storedExamId && storedExamId !== examSet._id) {
        console.log("⚠ Different exam detected, clearing old session");
        clearSessionButKeepReport();
        userAnswers = {};
        currentQ = 0;
        imageAnswers = {};
        examStartTime = Date.now();
    } 
    // Check if session is still valid
    else if (!isSessionValid()) {
        console.log("⚠ Session expired, starting fresh");
        clearSessionButKeepReport();
        userAnswers = {};
        currentQ = 0;
        imageAnswers = {};
        examStartTime = Date.now();
    } else {
        userAnswers = getFromLS(LS_KEYS.ANSWERS) || {};
        currentQ = getFromLS(LS_KEYS.CURRENT_QUESTION) || 0;
        imageAnswers = getFromLS(LS_KEYS.IMAGE_ANSWERS) || {};
        examStartTime = getFromLS(LS_KEYS.START_TIME) || Date.now();
    }

    console.log("✓ Exam data restored from localStorage");
    console.log("Answers:", userAnswers);
    console.log("Current Q:", currentQ);
}

    function renderQuestion(idx) {

        if (!examData || !examData.questions || idx >= examData.questions.length) {
            qa.innerHTML = `

                    <p class="text-lg font-bold">No Question Found</p>
                </div>

        }

        const total = examData.questions.length;

        }

        persistAllExamData();
    }

    if (questionHtml.trim() && !questionHtml.trim().startsWith('<div')) {

                    optHtml = optHtml

        try {

            saveToLS(LS_KEYS.EXAM_INFO, {
                subject: examSet.subject,
                matric: document.getElementById('student-regnum').innerText,
                student: (studentData.user?.fullName || studentData.user?.fullname || studentData.user?.name || ''),
                course: courseCode,
                timeCompleted: new Date().toISOString(),
                type: examType,
                answers: userAnswers,
                totalQuestions: examData.questions.length,
                duration: duration
            });

            saveToLS(LS_KEYS.SHUFFLED_QUESTIONS, examData);
            removeFromLS(LS_KEYS.ATTEMPT_ID);

            console.log("✓ Exam data saved to localStorage");

            setTimeout(() => {
                window.location.href = "results-summary";
            }, 500);
        } catch (err) {
            console.error("Submit error:", err);
            isSubmitting = false;
            showModal("An error occurred while submitting. Please try again.", { icon: true });
        }
    }

    async function submitTheoryExamHandler() {
        if (isSubmitting) return;
        isSubmitting = true;

        showModal("Submitting your exam...", {
            icon: false,
            actionText: ""
        });

        try {
            persistAllExamData();

            saveToLS(LS_KEYS.EXAM_INFO, {
                subject: examSet.subject,
                matric: document.getElementById('student-regnum').innerText,
                student: (studentData.user?.fullName || studentData.user?.fullname || studentData.user?.name || ''),
                course: courseCode,
                timeCompleted: new Date().toISOString(),
                type: examType,
                attemptId: attemptId,
                answers: userAnswers,
                totalQuestions: examData.questions.length,
                duration: duration
            });

            const result = await submitTheoryExamAPI();
            if (result) {
                document.getElementById('modal-root').innerHTML = "";
                setTimeout(() => {
                    window.location.href = "theory-results-summary";
                }, 500);
            } else {
                throw new Error("Submit failed");
            }
        } catch (err) {
            console.error("Submit error:", err);
            isSubmitting = false;
            showModal("An error occurred while submitting. Please try again.", { icon: true });
        }
    }

    // ============ TIMER ============
    function startTimer(secs) {
        let remaining = secs;
        const timerElem = document.getElementById('timer');

        function update() {
            const hours = Math.floor(remaining / 3600);
            const minutes = Math.floor((remaining % 3600) / 60);
            const seconds = remaining % 60;
            timerElem.textContent = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            if (remaining <= 300) {
                timerElem.classList.add('animate-pulse');
                timerElem.classList.remove('text-yellow-500');
                timerElem.classList.add('text-red-500', 'bg-yellow-50');
            }
        }

        update();
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            remaining--;
            update();
            if (remaining <= 0) {
                clearInterval(timer);
                timerElem.textContent = "00:00:00";
                persistAllExamData();
                showModal("⏰ Time's up! Your exam has been automatically submitted.", {
                    title: "Time Expired",
                    actionText: "See Results",
                    onAction: () => {
                        window.location.href = "results-summary";
                    }
                });
            }
        }, 1000);
    }

    function showLoadingState() {
        const qa = document.getElementById('question-area');
        qa.innerHTML = `
            <div class="text-center my-16 text-blue-700 font-semibold">
                <div class="loading-spinner mx-auto mb-4"></div>
                Loading exam...
            </div>
        `;
    }

    function showStatusMessage(message) {
        const qa = document.getElementById('question-area');
        qa.innerHTML = `
            <div class="text-center my-20 text-red-600">
                <i class="fa fa-exclamation-triangle text-5xl mb-4"></i>
                <p class="text-xl font-bold">${message}</p>
                <a href="mock.html" class="mt-6 inline-block px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Back to Exams
                </a>
            </div>
        `;
    }

    // ============ MAIN INITIALIZATION ============
    async function main() {
        try {
            const accessCode = getExamAccessCode();
            courseCode = getExamCourseCode() || "";

            if (!accessCode) {
                showModal("You must enter an exam access code before writing a test.", {
                    title: "No Access Code",
                    actionText: "Go to Access",
                    onAction: () => {
                        window.location.href = "mock.html";
                    }
                });
                return;
            }

            showLoadingState();

            studentData = await fetchStudentProfile();
            if (!studentData || !studentData.user) {
                showModal("Session expired. Please login and try again.", {
                    title: "Authentication Error",
                    actionText: "Login Again",
                    onAction: () => {
                        window.location.href = "mock.html";
                    }
                });
                return;
            }

            const studentName = studentData.user.fullName || studentData.user.fullname || studentData.user.name || "Student";
            const studentId = studentData.user.studentId || studentData.user.username || "N/A";

            document.getElementById('student-name').innerText = studentName;
            document.getElementById('student-regnum').innerText = studentId;

            const result = await fetchExamDataByAccessCode(accessCode);
            if (!result || !result.examSet) {
                showModal("Invalid or expired access code. Please re-enter.", {
                    title: "Exam Not Found",
                    actionText: "Go Back",
                    onAction: () => {
                        localStorage.removeItem("exam_access_code");
                        window.location.href = "mock.html";
                    }
                });
                return;
            }

            examSet = result.examSet;
            document.getElementById('exam-subject').innerText = examSet.subject || courseCode || "Unknown Subject";
            document.getElementById('exam-duration').innerText = (examSet.duration ? Math.round(examSet.duration / 60) + " mins" : "N/A");

            duration = examSet.duration || 3600;

            // Determine exam type
            const typeResult = await determineExamType(examSet._id);
            examType = typeResult.type;

            // Update UI with exam type
            const examTypeText = examType === "theory" ? "📄 Theory Exam" : examType === "hybrid" ? "🔀 Hybrid Exam" : "📝 CBT Exam";
            document.getElementById('exam-mode-label').textContent = examTypeText;
            document.getElementById('exam-type-label').textContent = examType.toUpperCase();
            document.getElementById('exam-type-indicator').innerHTML = 
                `<span class="exam-type-badge ${examType}">${examTypeText}</span>`;

            // Load questions based on exam type
            if (examType === "theory") {
                const theoryQuestions = typeResult.theoryQs || [];
                if (!theoryQuestions || theoryQuestions.length === 0) {
                    showStatusMessage("No theory questions found for this exam.");
                    return;
                }

                const attemptData = await initTheoryAttempt(examSet._id);
                if (!attemptData) {
                    showStatusMessage("Failed to initialize theory exam. Please try again.");
                    return;
                }

                attemptId = attemptData.attemptId;
                saveToLS(LS_KEYS.ATTEMPT_ID, attemptId);

                examData = {
                    subject: examSet.subject,
                    duration: examSet.duration || 3600,
                    questions: theoryQuestions,
                    type: "theory"
                };
            } else if (examType === "hybrid") {
                const cbtQuestions = typeResult.cbtQs || [];
                const theoryQuestions = typeResult.theoryQs || [];

                if ((cbtQuestions.length === 0 && theoryQuestions.length === 0)) {
                    showStatusMessage("No questions found for this exam.");
                    return;
                }

                let shuffleSession = getFromLS(LS_KEYS.SHUFFLED_QUESTIONS);
                if (shuffleSession) {
                    examData = shuffleSession;
                } else {
                    const allQuestions = [
                        ...cbtQuestions.map(q => ({ ...q, type: "cbt", id: q._id || Math.random().toString(36).slice(2, 12) })),
                        ...theoryQuestions.map(q => ({ ...q, type: "theory", id: q._id }))
                    ];
                    let shuffledQuestions = shuffleArray(allQuestions).map((q) => {
                        if (q.type === "cbt") {
                            return {
                                ...q,
                                options: shuffleArray((q.options || []).map(opt => ({ ...opt })))
                            };
                        }
                        return q;
                    });
                    examData = {
                        subject: examSet.subject,
                        duration: examSet.duration || 3600,
                        questions: shuffledQuestions,
                        type: "hybrid"
                    };
                    saveToLS(LS_KEYS.SHUFFLED_QUESTIONS, examData);
                }
            } else {
                // Standard CBT
                const cbtQuestions = typeResult.cbtQs || [];
                
                if (!Array.isArray(cbtQuestions) || cbtQuestions.length === 0) {
                    showStatusMessage("No CBT questions found for this exam.");
                    return;
                }

                let shuffleSession = getFromLS(LS_KEYS.SHUFFLED_QUESTIONS);
                if (shuffleSession) {
                    examData = shuffleSession;
                } else {
                    let shuffledQuestions = shuffleArray(cbtQuestions).map((q) => ({
                        ...q,
                        options: shuffleArray((q.options || []).map(opt => ({ ...opt }))),
                        id: q._id || (Math.random().toString(36).slice(2, 12)),
                    }));
                    examData = {
                        subject: examSet.subject,
                        duration: examSet.duration || 3600,
                        questions: shuffledQuestions,
                        type: "cbt"
                    };
                    saveToLS(LS_KEYS.SHUFFLED_QUESTIONS, examData);
                   
saveToLS(LS_KEYS.EXAM_ID, examSet._id);
                }
            }

            restoreExamData();
            startKeepAliveInterval();
            startDeviceCheckInterval();
            startTimer(duration);
            renderQuestion(currentQ);

        } catch (err) {
            console.error("Main error:", err);
            showStatusMessage(`An unexpected error occurred: ${err.message}`);
        }
    }

    // ============ PAGE LIFECYCLE ============
    document.getElementById('year').textContent = new Date().getFullYear();

    window.addEventListener("DOMContentLoaded", () => {
        performDeviceRedirect();
        main();
    });

    window.addEventListener("beforeunload", (e) => {
        stopKeepAliveInterval();
        stopDeviceCheckInterval();
        if (timer) clearInterval(timer);
        
        persistAllExamData();
    });
</script>
</body>
</html>
