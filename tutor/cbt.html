<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAU ExamGuard | Computer-Based Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "39326914-3a29-4a39-ace7-a9ae2545c93c",
                safari_web_id: "web.onesignal.auto.6836a56b-23bd-4172-b38f-daf17d70b8cc",
                notifyButton: { enable: true }
            });
        });
    </script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['$$','$$'], ['\\[','\\]']],
                packages: {'[+]': ['noerrors']}
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f4c75 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
            min-height: 100vh;
            color: #1e293b;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* HEADER/NAVBAR */
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 2px solid #3b82f6;
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 40;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
        }

        .header-brand img {
            height: 2.5rem;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.2));
        }

        .header-brand span {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .header-title {
            flex: 1;
            text-align: center;
            font-size: 1.2rem;
            color: #cbd5e1;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .header-timer {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            color: white;
            font-weight: 700;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .header-timer.warning {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 2rem;
            min-height: calc(100vh - 100px);
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* EXAM INFO CARDS */
        .exam-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.15);
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.15rem;
            font-weight: 700;
            color: #0f172a;
            word-break: break-word;
            line-height: 1.4;
        }

        /* QUESTION AREA */
        .question-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2.5rem;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .question-card::-webkit-scrollbar {
            width: 6px;
        }

        .question-card::-webkit-scrollbar-track {
            background: transparent;
        }

        .question-card::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 3px;
        }

        .question-card::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.5);
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 1.5rem;
        }

        .question-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 2rem;
            line-height: 1.6;
            word-break: break-word;
        }

        /* OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .option-item {
            position: relative;
        }

        .option-item input {
            display: none;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            gap: 1.25rem;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .option-label:hover {
            border-color: #3b82f6;
            background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 100%);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
            transform: translateX(4px);
        }

        .option-item input:checked + .option-label {
            background: linear-gradient(135deg, #dbeafe 0%, #e0f2fe 100%);
            border-color: #3b82f6;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.2);
        }

        .option-radio {
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            margin-top: 0.25rem;
            flex-shrink: 0;
            transition: all 0.2s ease;
            position: relative;
        }

        .option-item input:checked + .option-label .option-radio {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            border-color: #3b82f6;
            box-shadow: inset 0 0 0 3px white;
        }

        .option-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: #334155;
            line-height: 1.6;
            word-break: break-word;
        }

        .option-item input:checked + .option-label .option-text {
            color: #0f172a;
            font-weight: 600;
        }

        /* BUTTON GROUP */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 1.8rem;
            border-radius: 0.85rem;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
            border: 2px solid #cbd5e1;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            color: white;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* RIGHT SIDEBAR */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            height: fit-content;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            position: sticky;
            top: 100px;
        }

        .sidebar-card::-webkit-scrollbar {
            width: 5px;
        }

        .sidebar-card::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 3px;
        }

        .sidebar-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-title i {
            color: #3b82f6;
            font-size: 1.1rem;
        }

        .question-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.65rem;
            margin-bottom: 1.5rem;
        }

        .nav-btn {
            aspect-ratio: 1;
            border: 2px solid #e2e8f0;
            background: white;
            color: #64748b;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .nav-btn:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }

        .nav-btn.attempted {
            background: linear-gradient(135deg, #dcfce7, #f0fdf4);
            border-color: #22c55e;
            color: #15803d;
            font-weight: 800;
        }

        .nav-btn.current {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            border-color: #3b82f6;
            color: white;
            font-weight: 800;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
            transform: scale(1.08);
        }

        .nav-separator {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
            margin: 1.25rem 0;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 1.25rem;
            border-radius: 0.9rem;
            border: 2px solid #3b82f6;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-box {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.4s ease;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 1rem;
            text-align: center;
        }

        .modal-message {
            font-size: 1rem;
            color: #475569;
            line-height: 1.7;
            margin-bottom: 2rem;
            text-align: center;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .modal-actions .btn {
            flex: 1;
            min-width: 140px;
        }

        /* LOADER */
        .loader-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 2rem;
        }

        .spinner {
            width: 3.5rem;
            height: 3.5rem;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 1.1rem;
            color: #64748b;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .right-panel {
                position: relative;
                top: 0;
            }

            .sidebar-card {
                position: relative;
                top: auto;
                max-height: none;
            }

            .question-nav {
                grid-template-columns: repeat(6, 1fr);
            }

            .header-title {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                gap: 1rem;
            }

            .header-brand {
                font-size: 1.1rem;
            }

            .header-brand img {
                height: 2rem;
            }

            .header-timer {
                font-size: 0.9rem;
                padding: 0.4rem 1rem;
            }

            .main-container {
                padding: 1rem;
                gap: 1rem;
            }

            .exam-info {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }

            .info-card {
                padding: 1rem;
            }

            .question-card {
                padding: 1.5rem;
            }

            .question-title {
                font-size: 1.2rem;
            }

            .option-label {
                padding: 1rem;
                gap: 1rem;
            }

            .question-nav {
                grid-template-columns: repeat(5, 1fr);
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 0.75rem 1rem;
            }

            .header-content {
                flex-direction: column;
                gap: 0.75rem;
            }

            .header-brand {
                font-size: 1rem;
            }

            .header-brand img {
                height: 1.75rem;
            }

            .header-timer {
                font-size: 0.8rem;
            }

            .main-container {
                padding: 0.75rem;
                gap: 0.75rem;
                min-height: auto;
            }

            .exam-info {
                grid-template-columns: 1fr;
            }

            .question-card {
                padding: 1.25rem;
            }

            .question-title {
                font-size: 1.1rem;
                margin-bottom: 1.5rem;
            }

            .options-grid {
                gap: 1rem;
            }

            .option-label {
                padding: 0.9rem;
            }

            .question-nav {
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
            }

            .nav-btn {
                font-size: 0.8rem;
            }

            .sidebar-card {
                padding: 1rem;
            }

            .modal-box {
                padding: 1.5rem;
            }

            .modal-title {
                font-size: 1.2rem;
            }

            .modal-icon {
                font-size: 2.5rem;
                margin-bottom: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="header-brand">
                <img src="../logo.png" alt="OAU ExamGuard">
                <span>ExamGuard</span>
            </a>
            <div class="header-title">Computer-Based Test Session</div>
            <div class="header-right">
                <div class="header-timer" id="header-timer">02:00:00</div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main-container" id="main-container">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <!-- EXAM INFO -->
            <div class="exam-info">
                <div class="info-card">
                    <div class="info-label">Full Name</div>
                    <div class="info-value" id="student-name">Loading...</div>
                </div>
                <div class="info-card">
                    <div class="info-label">User ID</div>
                    <div class="info-value" id="student-regnum">Loading...</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Subject</div>
                    <div class="info-value" id="exam-subject">Loading...</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Duration</div>
                    <div class="info-value" id="exam-duration">Loading...</div>
                </div>
            </div>

            <!-- QUESTION AREA -->
            <div class="question-card" id="question-area">
                <div class="loader-box">
                    <div class="spinner"></div>
                    <div class="loader-text">Loading exam questions...</div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <!-- NAVIGATOR -->
            <div class="sidebar-card">
                <div class="sidebar-title">
                    <i class="fas fa-grip-vertical"></i> Questions
                </div>
                <div class="question-nav" id="question-nav"></div>
                <div class="nav-separator"></div>
                <button class="submit-btn" id="submit-btn">
                    <i class="fas fa-paper-plane"></i> Submit Exam
                </button>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div id="modal-root"></div>

    <script>
        const API_BASE = "https://examguide.onrender.com";
        let heartbeatInterval = null;

        function getToken() { return localStorage.getItem("student_jwt_token"); }
        function getExamAccessCode() { return localStorage.getItem("exam_access_code"); }
        function getExamCourseCode() { return localStorage.getItem("exam_course_code"); }

        // Heartbeat to keep Render awake
        function startHeartbeat() {
            console.log("🔄 Heartbeat started");
            heartbeatInterval = setInterval(async () => {
                try {
                    await fetch(API_BASE + "/api/heartbeat", {
                        method: "GET",
                        headers: { Authorization: "Bearer " + getToken() },
                        signal: AbortSignal.timeout(5000)
                    });
                } catch (err) {
                    console.debug("Heartbeat (non-critical):", err.message);
                }
            }, 240000); // 4 minutes
        }

        function stopHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            console.log("⛔ Heartbeat stopped");
        }

        // Reset on reload
        if (performance.navigation && performance.navigation.type === 1) {
            sessionStorage.removeItem('cbt_user_answers');
            sessionStorage.removeItem('cbt_shuffled_questions');
            sessionStorage.removeItem('cbt_exam_info');
            stopHeartbeat();
            location.replace(location.pathname + location.search);
        }

        function shuffleArray(arr) {
            arr = arr.slice();
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function normalizeQuestionMath(html) {
            if (!html || typeof html !== 'string') return html;
            let s = html.replace(/\\\\/g, '\\');
            if (/\\\(|\\\[|\$\$?/.test(s)) return s;
            const cmdRegex = /\\(?:frac|sqrt|sum|int|lim|left|right|cdot|times|pi|alpha|beta|gamma|theta|log|ln)(?:\{[^}]*\}|\^[^{\s]+|\_[^{\s]+)*/g;
            s = s.replace(cmdRegex, (m) => `\\(${m}\\)`);
            const expRegex = /([A-Za-z0-9])\^(?:\{[^}]+\}|\d+)/g;
            s = s.replace(expRegex, (m) => `\\(${m}\\)`);
            const subRegex = /([A-Za-z0-9])_(?:\{[^}]+\}|\d+)/g;
            s = s.replace(subRegex, (m) => `\\(${m}\\)`);
            return s;
        }

        async function fetchStudentProfile() {
            try {
                const res = await fetch(API_BASE + "/api/auth/me", {
                    headers: { Authorization: "Bearer " + getToken() }
                });
                if (!res.ok) throw new Error("Not authenticated");
                return await res.json();
            } catch (err) { return null; }
        }

        async function fetchExamDataByAccessCode(accessCode) {
            try {
                const res = await fetch(API_BASE + `/api/exam-set/by-access?accessCode=${encodeURIComponent(accessCode)}`);
                if (!res.ok) throw new Error("Not found");
                return await res.json();
            } catch (err) { return null; }
        }

        let userAnswers = {};
        let examData = null, studentData = null, currentQ = 0, timer = null, duration = 0, courseCode = "";

        function showModal(message, opts = {}) {
            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="modal-overlay">
                    <div class="modal-box">
                        ${opts.icon !== false ? `<div class="modal-icon">${opts.iconHtml || '✓'}</div>` : ''}
                        <div class="modal-title">${opts.title || "Notice"}</div>
                        <div class="modal-message">${message}</div>
                        <div class="modal-actions">
                            ${opts.actionText ? `<button id="modal-action-btn" class="btn btn-primary">${opts.actionText}</button>` : ''}
                            <button id="close-modal-btn" class="btn btn-secondary">Close</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('close-modal-btn').onclick = () => { root.innerHTML = ""; };
            if (opts.onAction) {
                document.getElementById('modal-action-btn').onclick = () => { root.innerHTML = ""; opts.onAction(); };
            }
        }

        function persistUserAnswers() {
            sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
        }

        async function main() {
            const accessCode = getExamAccessCode();
            courseCode = getExamCourseCode() || "";

            if (!accessCode) {
                showModal("You must enter an exam access code before writing a test.", {
                    title: "No Access Code",
                    iconHtml: '<i class="fas fa-lock" style="color: #ef4444;"></i>',
                    actionText: "Go to Access",
                    onAction: () => { window.location.href = "mock.html"; }
                });
                return;
            }

            studentData = await fetchStudentProfile();
            if (!studentData) {
                showModal("Session expired, please login and try again.", {
                    title: "Session Expired",
                    iconHtml: '<i class="fas fa-clock" style="color: #f97316;"></i>',
                    actionText: "Login",
                    onAction: () => { window.location.href = "mock.html"; }
                });
                return;
            }

            document.getElementById('student-name').innerText = studentData.user.fullName || studentData.user.fullname || studentData.user.name || "(No Name)";
            document.getElementById('student-regnum').innerText = studentData.user.studentId || studentData.user.username || "(No Student ID)";

            const result = await fetchExamDataByAccessCode(accessCode);
            if (!result || !result.examSet || !Array.isArray(result.questions)) {
                showModal("Invalid or expired access code.", {
                    title: "Invalid Code",
                    iconHtml: '<i class="fas fa-times-circle" style="color: #ef4444;"></i>',
                    actionText: "Try Again",
                    onAction: () => { localStorage.removeItem("exam_access_code"); window.location.href = "mock.html"; }
                });
                return;
            }

            let shuffleSession = sessionStorage.getItem('cbt_shuffled_questions');
            if (shuffleSession) {
                examData = JSON.parse(shuffleSession);
            } else {
                let shuffledQuestions = shuffleArray(result.questions).map((q) => ({
                    ...q,
                    options: shuffleArray((q.options || []).map(opt => ({ ...opt }))),
                    id: q._id || Math.random().toString(36).slice(2, 12),
                }));
                examData = {
                    subject: result.examSet.subject,
                    duration: result.examSet.duration || 3600,
                    questions: shuffledQuestions
                };
                sessionStorage.setItem('cbt_shuffled_questions', JSON.stringify(examData));
            }

            document.getElementById('exam-subject').innerText = examData.subject || courseCode;
            document.getElementById('exam-duration').innerText = examData.duration ? Math.round(examData.duration / 60) + " mins" : '';

            const storedAnswers = sessionStorage.getItem('cbt_user_answers');
            if (storedAnswers) userAnswers = JSON.parse(storedAnswers);

            duration = examData.duration || 3600;
            startHeartbeat();
            startTimer(duration);
            renderQuestion(currentQ);
        }

        function renderQuestion(idx) {
            const qa = document.getElementById("question-area");
            if (!examData || !examData.questions || idx >= examData.questions.length) {
                qa.innerHTML = '<div class="loader-box"><div style="color: #ef4444; font-weight: 700;">No Question Found</div></div>';
                return;
            }

            const total = examData.questions.length;
            const q = examData.questions[idx];
            const savedAnswer = userAnswers[q.id] || "";
            const questionHtml = normalizeQuestionMath(q.question || '');

            qa.innerHTML = `
                <div class="question-number">Question ${idx + 1} / ${total}</div>
                <div class="question-title">${questionHtml}</div>
                <div class="options-grid">
                    ${(q.options || []).map((opt, i) => {
                        const label = String.fromCharCode(65 + i);
                        const optHtml = normalizeQuestionMath(opt.text || '');
                        return `
                            <label class="option-item">
                                <input type="radio" name="qSelect" value="${opt.key}" ${savedAnswer === opt.key ? 'checked' : ''} />
                                <label class="option-label" for="">
                                    <div class="option-radio"></div>
                                    <div class="option-text">${label}. ${optHtml}</div>
                                </label>
                            </label>
                        `;
                    }).join('')}
                </div>
                <div class="button-group">
                    <button class="btn btn-secondary" ${idx === 0 ? 'disabled' : ''} id="prev-btn">
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <button class="btn btn-primary" ${idx === total - 1 ? 'disabled' : ''} id="next-btn">
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            `;

            updateNav();

            document.querySelectorAll('input[name="qSelect"]').forEach(input => {
                input.onchange = () => {
                    userAnswers[q.id] = input.value;
                    persistUserAnswers();
                    renderQuestion(idx);
                };
            });

            document.getElementById("prev-btn").onclick = (e) => {
                e.preventDefault();
                if (currentQ > 0) { currentQ--; renderQuestion(currentQ); }
            };

            document.getElementById("next-btn").onclick = (e) => {
                e.preventDefault();
                if (currentQ < total - 1) { currentQ++; renderQuestion(currentQ); }
            };

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([qa]).catch(() => {});
            }
        }

        function updateNav() {
            const nav = document.getElementById('question-nav');
            let html = "";
            examData.questions.forEach((q, i) => {
                const attempted = !!userAnswers[q.id];
                const isCurrent = i === currentQ;
                let cls = 'nav-btn';
                if (isCurrent) cls += ' current';
                else if (attempted) cls += ' attempted';
                html += `<button class="${cls}" data-q="${i}">${i + 1}</button>`;
            });
            nav.innerHTML = html;
            nav.querySelectorAll('button').forEach(btn => {
                btn.onclick = (e) => { e.preventDefault(); currentQ = parseInt(btn.dataset.q); renderQuestion(currentQ); };
            });
        }

        function startTimer(secs) {
            let remaining = secs;
            const timerElem = document.getElementById('header-timer');

            function update() {
                const h = Math.floor(remaining / 3600);
                const m = Math.floor((remaining % 3600) / 60);
                const s = remaining % 60;
                timerElem.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (remaining <= 300) timerElem.classList.add('warning');
            }

            update();
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                remaining--;
                update();
                if (remaining <= 0) {
                    clearInterval(timer);
                    stopHeartbeat();
                    showModal("Time's up! Your exam has been automatically submitted.", {
                        title: "Time Expired",
                        iconHtml: '<i class="fas fa-hourglass-end" style="color: #ef4444;"></i>',
                        actionText: "View Results",
                        onAction: () => {
                            persistUserAnswers();
                            sessionStorage.setItem('cbt_exam_info', JSON.stringify({
                                subject: examData.subject,
                                matric: document.getElementById('student-regnum').innerText,
                                student: studentData.user.fullName || '',
                                course: courseCode,
                                timeCompleted: new Date().toISOString()
                            }));
                            sessionStorage.removeItem('cbt_shuffled_questions');
                            window.location.href = "results-summary";
                        }
                    });
                }
            }, 1000);
        }

        document.getElementById('submit-btn').onclick = (e) => {
            e.preventDefault();
            showModal("Submit your exam? You won't be able to change your answers.", {
                title: "Submit Exam?",
                iconHtml: '<i class="fas fa-check-circle" style="color: #3b82f6;"></i>',
                actionText: "Yes, Submit",
                onAction: () => {
                    stopHeartbeat();
                    persistUserAnswers();
                    sessionStorage.setItem('cbt_exam_info', JSON.stringify({
                        subject: examData.subject,
                        matric: document.getElementById('student-regnum').innerText,
                        student: studentData.user.fullName || '',
                        course: courseCode,
                        timeCompleted: new Date().toISOString()
                    }));
                    sessionStorage.removeItem('cbt_shuffled_questions');
                    window.location.href = "results-summary";
                }
            });
        };

        window.addEventListener("DOMContentLoaded", main);
    </script>
</body>
</html>
