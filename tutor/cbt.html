<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAU ExamGuard | Computer-Based Test Session</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Flowbite CSS & JS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>

      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "39326914-3a29-4a39-ace7-a9ae2545c93c",
          safari_web_id: "web.onesignal.auto.6836a56b-23bd-4172-b38f-daf17d70b8cc",
          notifyButton: {
            enable: true,
          },
        });
      });
    </script>
    <!-- MathJax v3: enables rendering of LaTeX expressions -->
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)'], ['$', '$']],
          displayMath: [['$$','$$'], ['\\[','\\]']],
          packages: {'[+]': ['noerrors']}
        },
        options: {
          skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        },
        svg: { fontCache: 'global' }
      };

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        .exam-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #f5f7fa;
        }

        /* NAVBAR STYLING */
        .exam-navbar {
            background: linear-gradient(90deg, #1e293b 0%, #0f172a 50%, #ffd500 95%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .navbar-brand img {
            height: 2.5rem;
            filter: brightness(1.1);
        }

        .navbar-brand span.brand-text {
            background: linear-gradient(90deg, #ffd500, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-info {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
        }

        .navbar-status {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .navbar-status i {
            font-size: 1.25rem;
            color: #ffd500;
        }

        /* MAIN CONTENT AREA */
        .exam-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            gap: 1.5rem;
            padding: 1.5rem;
        }

        /* SIDEBAR - Question Navigation */
        .sidebar-nav {
            width: 200px;
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }

        .sidebar-nav-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sidebar-nav-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #f1f5f9;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffd500;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .question-palette {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .question-palette::-webkit-scrollbar {
            width: 6px;
        }

        .question-palette::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .question-palette::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .question-palette::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .qp-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            color: #475569;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .qp-item:hover {
            transform: scale(1.05);
            border-color: #ffd500;
            box-shadow: 0 4px 12px rgba(255, 213, 0, 0.2);
        }

        .qp-item.qp-done {
            background: #d1fae5;
            color: #065f46;
            border-color: #10b981;
            font-weight: 700;
        }

        .qp-item.qp-current {
            background: #ffd500;
            color: #1e293b;
            border-color: #ffd500;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255, 213, 0, 0.3);
        }

        /* MAIN QUESTION AREA */
        .question-main {
            flex: 1;
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #f1f5f9;
        }

        .question-number {
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .question-progress {
            font-size: 0.95rem;
            color: #ffd500;
            font-weight: 700;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
            flex: 1;
        }

        .option-card {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            padding: 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 1.2rem;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .option-card:hover {
            border-color: #ffd500;
            background: #fffbf0;
            box-shadow: 0 6px 20px rgba(255, 213, 0, 0.15);
            transform: translateX(4px);
        }

        .option-card input[type="radio"] {
            width: 1.5rem;
            height: 1.5rem;
            margin-top: 0.35rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 1.05rem;
            color: #334155;
            line-height: 1.6;
            word-break: break-word;
        }

        .option-card input[type="radio"]:checked + .option-text {
            color: #1e293b;
            font-weight: 600;
        }

        .option-card.selected {
            border-color: #ffd500;
            background: #fffbf0;
            box-shadow: 0 6px 20px rgba(255, 213, 0, 0.15);
        }

        /* ACTIONS BAR */
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn-nav {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.9rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-prev {
            background: #f1f5f9;
            color: #475569;
            border: 2px solid #e2e8f0;
        }

        .btn-prev:hover:not(:disabled) {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: #ffd500;
            color: #1e293b;
            border: 2px solid #ffd500;
        }

        .btn-next:hover:not(:disabled) {
            background: #ffed4e;
            border-color: #ffed4e;
            box-shadow: 0 4px 12px rgba(255, 213, 0, 0.3);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            padding: 0.75rem 2rem;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.9rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .btn-submit:hover {
            background: #dc2626;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        /* EXAM INFO CARD (RIGHT SIDEBAR) */
        .info-sidebar {
            width: 280px;
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .info-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-value {
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 600;
            word-break: break-word;
        }

        .info-subject {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #ffd500;
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .timer-container {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
        }

        .timer-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .timer-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffd500;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
        }

        .timer-value.critical {
            animation: pulse 1s infinite;
            color: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* MODAL STYLING */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-panel {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 2.5rem;
            min-width: 320px;
            max-width: 500px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #475569;
        }

        .modal-icon {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .modal-icon i {
            font-size: 3rem;
        }

        .modal-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        .modal-message {
            text-align: center;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-btn {
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn-primary {
            background: #ffd500;
            color: #1e293b;
        }

        .modal-btn-primary:hover {
            background: #ffed4e;
            box-shadow: 0 4px 12px rgba(255, 213, 0, 0.3);
        }

        .modal-btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 2px solid #e2e8f0;
        }

        .modal-btn-secondary:hover {
            background: #e2e8f0;
        }

        /* FOOTER */
        .exam-footer {
            background: #1e293b;
            color: #94a3b8;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            border-top: 2px solid #0f172a;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 1200px) {
            .exam-content {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .sidebar-nav, .info-sidebar {
                width: 100%;
                order: 1;
            }

            .question-main {
                order: 2;
            }

            .question-palette {
                grid-template-columns: repeat(4, 1fr);
            }

            .navbar-info {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-end;
            }
        }

        @media (max-width: 768px) {
            .exam-container {
                height: auto;
            }

            .exam-navbar {
                padding: 0.75rem 1rem;
            }

            .navbar-content {
                flex-direction: column;
                gap: 1rem;
            }

            .navbar-brand {
                font-size: 1rem;
            }

            .navbar-brand img {
                height: 2rem;
            }

            .navbar-info {
                justify-content: space-between;
                width: 100%;
                flex-direction: row;
            }

            .exam-content {
                flex-direction: column;
                gap: 0.75rem;
                padding: 0.75rem;
            }

            .question-main {
                padding: 1.5rem;
                border-radius: 1rem;
            }

            .question-text {
                font-size: 1.1rem;
                margin-bottom: 1.5rem;
            }

            .options-container {
                gap: 0.75rem;
            }

            .option-card {
                padding: 1rem;
                gap: 1rem;
            }

            .option-text {
                font-size: 0.95rem;
            }

            .actions-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-buttons {
                width: 100%;
                justify-content: space-between;
            }

            .btn-nav {
                flex: 1;
                justify-content: center;
            }

            .btn-submit {
                width: 100%;
                justify-content: center;
            }

            .sidebar-nav, .info-sidebar {
                width: 100%;
                max-height: 200px;
            }

            .question-palette {
                grid-template-columns: repeat(5, 1fr);
                max-height: 120px;
            }

            .timer-value {
                font-size: 2rem;
            }

            .modal-panel {
                margin: 1rem;
                max-width: calc(100% - 2rem);
            }
        }

        @media (max-width: 480px) {
            .exam-navbar {
                padding: 0.5rem;
            }

            .navbar-content {
                gap: 0.5rem;
            }

            .navbar-brand {
                font-size: 0.9rem;
            }

            .navbar-brand img {
                height: 1.75rem;
            }

            .navbar-status {
                font-size: 0.8rem;
                gap: 0.5rem;
            }

            .question-main {
                padding: 1rem;
                border-radius: 0.75rem;
            }

            .question-text {
                font-size: 1rem;
            }

            .option-card {
                padding: 0.75rem;
            }

            .option-text {
                font-size: 0.9rem;
            }

            .timer-value {
                font-size: 1.75rem;
            }

            .question-palette {
                grid-template-columns: repeat(4, 1fr);
                max-height: 100px;
            }

            .btn-nav {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }

        .question-main::-webkit-scrollbar {
            width: 8px;
        }

        .question-main::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .question-main::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .question-main::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="exam-container">
        <!-- NAVBAR -->
        <nav class="exam-navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <img src="../logo.png" alt="OAU ExamGuard Logo">
                    <span>OAU <span class="brand-text">ExamGuard</span></span>
                </div>
                <div class="navbar-info">
                    <div class="navbar-status">
                        <i class="fas fa-laptop"></i>
                        <span id="exam-mode">CBT Mode</span>
                    </div>
                    <div class="navbar-status">
                        <i class="fas fa-book"></i>
                        <span id="navbar-subject">Loading...</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="exam-content">
            <!-- LEFT SIDEBAR - Question Navigation -->
            <div class="sidebar-nav">
                <div class="sidebar-nav-title">Questions</div>
                <div class="sidebar-nav-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="answered-count">0</div>
                        <div class="stat-label">Answered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="remaining-count">0</div>
                        <div class="stat-label">Remaining</div>
                    </div>
                </div>
                <div class="question-palette" id="question-nav-list"></div>
            </div>

            <!-- CENTER - Question Area -->
            <div class="question-main" id="question-area">
                <div style="text-align: center; color: #64748b; padding: 3rem;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; color: #ffd500;"></i>
                    <p style="margin-top: 1rem; font-weight: 600;">Loading exam...</p>
                </div>
            </div>

            <!-- RIGHT SIDEBAR - Exam Info & Timer -->
            <div class="info-sidebar" id="info-sidebar">
                <div class="info-subject" id="exam-subject">Loading...</div>
                
                <div class="info-item">
                    <div class="info-label">Student Name</div>
                    <div class="info-value" id="student-name">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">Student ID</div>
                    <div class="info-value" id="student-regnum">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">Duration</div>
                    <div class="info-value" id="exam-duration">-</div>
                </div>
                
                <div class="timer-container">
                    <div class="timer-label">Time Remaining</div>
                    <div class="timer-value" id="timer">00:00:00</div>
                </div>
            </div>
        </div>

        <!-- MODAL ROOT -->
        <div id="modal-root"></div>

        <!-- FOOTER -->
        <div class="exam-footer">
            &copy; <span id="year"></span> OAU ExamGuard Nigeria. <span style="color: white;">Your Exam, Our Priority.</span>
        </div>
    </div>

    <script>
        const API_BASE = "https://examguide.onrender.com";
        
        // ===== KEEP-ALIVE FUNCTION: Refresh backend every 4 minutes =====
        function startKeepAliveInterval() {
            setInterval(async () => {
                try {
                    const token = getToken();
                    if (token) {
                        await fetch(API_BASE + "/api/auth/me", {
                            headers: { Authorization: "Bearer " + token }
                        });
                        console.log("Keep-alive ping sent ✓");
                    }
                } catch (err) {
                    console.warn("Keep-alive ping failed:", err.message);
                }
            }, 4 * 60 * 1000); // 4 minutes
        }

        function getToken() { return localStorage.getItem("student_jwt_token"); }
        function getExamAccessCode() { return localStorage.getItem("exam_access_code"); }
        function getExamCourseCode() { return localStorage.getItem("exam_course_code"); }

        // Reset session after a reload/navigation guard
        if (performance.navigation && performance.navigation.type === 1) {
            sessionStorage.removeItem('cbt_user_answers');
            sessionStorage.removeItem('cbt_shuffled_questions');
            sessionStorage.removeItem('cbt_exam_info');
            location.replace(location.pathname + location.search);
        }

        // Fisher-Yates shuffle
        function shuffleArray(arr) {
            arr = arr.slice();
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Normalize question/option HTML for MathJax
        function normalizeQuestionMath(html) {
            if (!html || typeof html !== 'string') return html;

            let s = html.replace(/\\\\/g, '\\');

            if (/\\\(|\\\[|\$\$?/.test(s)) return s;

            const cmdRegex = /\\(?:frac|sqrt|sum|int|lim|left|right|cdot|times|pi|alpha|beta|gamma|theta|log|ln)(?:\{[^}]*\}|\^[^{\s]+|\_[^{\s]+)*/g;
            s = s.replace(cmdRegex, function(m) { return `\\(${m}\\)`; });

            const expRegex = /([A-Za-z0-9])\^(?:\{[^}]+\}|\d+)/g;
            s = s.replace(expRegex, function(m) { return `\\(${m}\\)`; });

            const subRegex = /([A-Za-z0-9])_(?:\{[^}]+\}|\d+)/g;
            s = s.replace(subRegex, function(m) { return `\\(${m}\\)`; });

            return s;
        }

        async function fetchStudentProfile() {
            try {
                const res = await fetch(API_BASE + "/api/auth/me", {
                    headers: { Authorization: "Bearer " + getToken() }
                });
                if (!res.ok) throw new Error("Not authenticated");
                return await res.json();
            } catch (err) { return null; }
        }

        async function fetchExamDataByAccessCode(accessCode) {
            try {
                const res = await fetch(API_BASE + `/api/exam-set/by-access?accessCode=${encodeURIComponent(accessCode)}`);
                if (!res.ok) throw new Error("Not found");
                return await res.json();
            } catch (err) { return null; }
        }

        let userAnswers = {};
        let examData = null, studentData = null, currentQ = 0, timer = null, duration = 0, courseCode = "";

        function showModal(message, opts={}) {
            const root = document.getElementById('modal-root');
            const iconClass = opts.iconClass || 'fa-info-circle text-blue-500';
            root.innerHTML = `
                <div class="modal-bg">
                    <div class="modal-panel">
                        <button class="modal-close" id="close-modal-btn">
                            <i class="fas fa-times"></i>
                        </button>
                        ${(opts.icon !== false) ? `
                            <div class="modal-icon">
                                <i class="fas ${iconClass}" style="font-size: 3rem;"></i>
                            </div>
                        ` : ""}
                        <div class="modal-title">${opts.title || "Notice"}</div>
                        <div class="modal-message">${message}</div>
                        <div class="modal-actions">
                            ${(opts.actionText) ? `<button id="modal-action-btn" class="modal-btn modal-btn-primary">${opts.actionText}</button>` : ""}
                            <button id="modal-close-btn" class="modal-btn modal-btn-secondary">Close</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('close-modal-btn').onclick = () => root.innerHTML = "";
            document.getElementById('modal-close-btn').onclick = () => root.innerHTML = "";
            
            if (opts.onAction && document.getElementById('modal-action-btn')) {
                document.getElementById('modal-action-btn').onclick = () => {
                    root.innerHTML = "";
                    opts.onAction();
                };
            }
        }

        function persistUserAnswers() {
            sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
        }

        function updateStats() {
            const total = examData.questions.length;
            const answered = Object.keys(userAnswers).filter(k => userAnswers[k]).length;
            document.getElementById('answered-count').textContent = answered;
            document.getElementById('remaining-count').textContent = total - answered;
        }

        async function main() {
            // Start keep-alive ping
            startKeepAliveInterval();

            const accessCode = getExamAccessCode();
            courseCode = getExamCourseCode() || "";
            
            if (!accessCode) {
                showModal("You must enter an exam access code before writing a test.", {
                    title: "No Access Code",
                    iconClass: "fa-lock text-red-500",
                    actionText: "Go to Access",
                    onAction: () => { window.location.href = "mock.html"; }
                });
                return;
            }

            studentData = await fetchStudentProfile();
            if (!studentData) {
                showModal("Session expired, please login and try again.", {
                    title: "Session Expired",
                    iconClass: "fa-clock text-orange-500",
                    actionText: "Go to Login",
                    onAction: () => { window.location.href = "mock.html"; }
                });
                return;
            }

            document.getElementById('student-name').innerText =
                studentData.user.fullName || studentData.user.fullname || studentData.user.name || "(No Name)";
            document.getElementById('student-regnum').innerText =
                studentData.user.studentId || studentData.user.username || "(No Student ID)";
            
            const result = await fetchExamDataByAccessCode(accessCode);
            if (!result || !result.examSet || !Array.isArray(result.questions)) {
                showModal("Invalid or expired access code. Please re-enter.", {
                    title: "Invalid Access Code",
                    iconClass: "fa-exclamation-triangle text-red-500",
                    actionText: "Go to Access",
                    onAction: () => {
                        localStorage.removeItem("exam_access_code");
                        window.location.href = "mock.html";
                    }
                });
                return;
            }

            // Load or shuffle questions
            let shuffleSession = sessionStorage.getItem('cbt_shuffled_questions');
            if (shuffleSession) {
                examData = JSON.parse(shuffleSession);
            } else {
                let shuffledQuestions = shuffleArray(result.questions).map((q) => ({
                    ...q,
                    options: shuffleArray((q.options || []).map(opt => ({ ...opt }))),
                    id: q._id || (Math.random().toString(36).slice(2,12)),
                }));
                examData = {
                    subject: result.examSet.subject,
                    duration: result.examSet.duration || 3600,
                    questions: shuffledQuestions
                };
                sessionStorage.setItem('cbt_shuffled_questions', JSON.stringify(examData));
            }

            document.getElementById('exam-subject').innerText = examData.subject || courseCode;
            document.getElementById('navbar-subject').innerText = examData.subject || courseCode;
            document.getElementById('exam-duration').innerText = (examData.duration ? Math.round(examData.duration/60) + " mins" : '');

            const storedAnswers = sessionStorage.getItem('cbt_user_answers');
            if(storedAnswers) userAnswers = JSON.parse(storedAnswers);

            duration = examData.duration || 3600;
            startTimer(duration);
            renderQuestion(currentQ);
        }

        function renderQuestion(idx) {
            const qa = document.getElementById("question-area");
            if (!examData || !examData.questions || idx >= examData.questions.length) {
                qa.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 3rem;"><i class="fas fa-exclamation-circle" style="font-size: 2.5rem;"></i><p style="margin-top: 1rem; font-weight: 600;">No Question Found.</p></div>';
                return;
            }

            const total = examData.questions.length;
            const q = examData.questions[idx];
            const savedAnswer = userAnswers[q.id] || "";
            const questionHtml = normalizeQuestionMath(q.question || '');

            qa.innerHTML = `
                <div class="question-header">
                    <div>
                        <div class="question-number">Question <span id="current-q-num">${idx+1}</span></div>
                        <div class="question-progress"><span id="current-q-progress">${idx+1}</span> of <span id="total-q">${total}</span></div>
                    </div>
                </div>
                <div class="question-text">${questionHtml}</div>
                <div class="options-container">
                    ${
                        (q.options || []).map((opt, i) => {
                            const label = String.fromCharCode(65 + i);
                            const optHtml = normalizeQuestionMath(opt.text || '');
                            const isChecked = savedAnswer === opt.key;
                            return `
                                <label class="option-card ${isChecked ? 'selected' : ''}">
                                    <input type="radio" name="qSelect" value="${opt.key}" ${isChecked ? 'checked' : ''} />
                                    <span class="option-text"><strong>${label}.</strong> ${optHtml}</span>
                                </label>
                            `;
                        }).join('')
                    }
                </div>
                <div class="actions-bar">
                    <div class="nav-buttons">
                        <button class="btn-nav btn-prev" ${idx === 0 ? 'disabled' : ''} id="prev-btn">
                            <i class="fas fa-chevron-left"></i> Previous
                        </button>
                        <button class="btn-nav btn-next" ${idx === total - 1 ? 'disabled' : ''} id="next-btn">
                            Next <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <button class="btn-submit" id="submit-btn">
                        <i class="fas fa-paper-plane"></i> Submit Exam
                    </button>
                </div>
            `;

            // Render question palette
            const pallet = document.getElementById("question-nav-list");
            let navHtml = "";
            for (let j = 0; j < total; j++) {
                const navId = examData.questions[j].id;
                const attempted = !!userAnswers[navId];
                const curr = j === idx;
                const navClass = curr ? "qp-current" : (attempted ? "qp-done" : "");
                navHtml += `
                    <a href="#" data-qp="${j}" class="qp-item ${navClass}" ${curr ? 'aria-current="page"' : ''}>
                        ${j + 1}
                    </a>
                `;
            }
            pallet.innerHTML = navHtml;

            updateStats();

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise([qa]).catch((err) => {
                    console.warn("MathJax typeset error:", err && err.message);
                });
            }

            // Event listeners
            document.querySelectorAll('input[name="qSelect"]').forEach(input => {
                input.onchange = function() {
                    userAnswers[q.id] = this.value;
                    persistUserAnswers();
                    renderQuestion(idx);
                };
            });

            document.getElementById("prev-btn").onclick = (e) => {
                e.preventDefault();
                if (currentQ > 0) {
                    currentQ--;
                    renderQuestion(currentQ);
                }
            };

            document.getElementById("next-btn").onclick = (e) => {
                e.preventDefault();
                if (currentQ < total - 1) {
                    currentQ++;
                    renderQuestion(currentQ);
                }
            };

            pallet.querySelectorAll('a[data-qp]').forEach(a => {
                a.onclick = (ev) => {
                    ev.preventDefault();
                    currentQ = parseInt(a.getAttribute('data-qp'));
                    renderQuestion(currentQ);
                };
            });

            document.getElementById("submit-btn").onclick = (e) => {
                e.preventDefault();
                showModal("Are you sure you want to submit your answers and end the test? This action cannot be undone.", {
                    title: "Submit Mock Exam",
                    iconClass: "fa-question-circle text-yellow-500",
                    actionText: "Yes, Submit",
                    onAction: () => {
                        persistUserAnswers();
                        sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
                        sessionStorage.setItem('cbt_exam_info', JSON.stringify({
                            subject: examData.subject,
                            matric: document.getElementById('student-regnum').innerText,
                            student: (studentData.user.fullName || studentData.user.fullname || studentData.user.name || ''),
                            course: courseCode,
                            timeCompleted: new Date().toISOString()
                        }));
                        sessionStorage.removeItem('cbt_shuffled_questions');
                        window.location.href = "results-summary";
                    }
                });
            };
        }

        function startTimer(secs) {
            let remaining = secs;
            const timerElem = document.getElementById('timer');
            
            function update() {
                const hours = Math.floor(remaining / 3600);
                const minutes = Math.floor((remaining % 3600) / 60);
                const seconds = remaining % 60;
                timerElem.textContent =
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining <= 300) {
                    timerElem.classList.add('critical');
                }
            }
            
            update();
            if (timer) clearInterval(timer);
            
            timer = setInterval(() => {
                remaining--;
                update();
                if (remaining <= 0) {
                    clearInterval(timer);
                    timerElem.textContent = "00:00:00";
                    showModal("Time has expired! Your exam has been automatically submitted.", {
                        title: "Time Up",
                        iconClass: "fa-hourglass-end text-red-500",
                        actionText: "View Results",
                        onAction: () => {
                            persistUserAnswers();
                            sessionStorage.setItem('cbt_user_answers', JSON.stringify(userAnswers));
                            sessionStorage.removeItem('cbt_shuffled_questions');
                            window.location.href = "results-summary";
                        }
                    });
                }
            }, 1000);
        }

        document.getElementById('year').textContent = new Date().getFullYear();
        window.addEventListener("DOMContentLoaded", main);
    </script>
</body>
</html>
