<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Utility to truncate text to 2 lines */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 pb-20">

  <header class="bg-white sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <a href="#" class="text-xl font-black text-orange-600 tracking-tight">ExamGuide<span class="text-gray-800">Mart</span></a>
      
      <div class="flex-1 max-w-2xl flex relative">
        <input type="text" id="search-input" placeholder="Search items, categories..." 
               class="w-full bg-gray-100 border-none rounded-l-full py-2 pl-4 pr-10 focus:ring-2 focus:ring-orange-500 focus:outline-none text-sm">
        <button id="search-btn" class="bg-gray-800 text-white px-5 py-2 rounded-r-full hover:bg-black transition text-sm font-semibold">
          Search
        </button>
      </div>

      <div class="hidden md:block">
        <a id="account-btn" href="/login" class="text-sm font-semibold text-gray-700 hover:text-orange-600">Sign In</a>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-2 sm:px-4 mt-4">
    
    <div id="products-spinner" class="hidden flex justify-center items-center py-10">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-orange-600"></div>
    </div>

    <div id="products-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 sm:gap-4 transition-opacity duration-300">
      </div>

  </main>

  <div id="sendOfferModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 backdrop-blur-sm px-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden relative">
      <div class="bg-orange-50 text-orange-600 px-6 py-4 border-b border-orange-100 flex justify-between items-center">
        <h3 class="text-lg font-bold">Make an Offer</h3>
        <button type="button" onclick="closeOfferModal()" class="text-gray-400 hover:text-gray-800 text-2xl leading-none">&times;</button>
      </div>
      
      <form id="offerForm" class="p-6">
        <input type="hidden" id="offerProductId">
        
        <div id="buyerDetails" class="mb-4 text-xs text-gray-600 bg-gray-50 p-3 rounded-lg border border-gray-100">
          </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Your Offer Price (₦)</label>
          <input type="number" id="offerPrice" required placeholder="e.g. 5000" 
                 class="w-full border border-gray-300 rounded-lg py-2 px-3 focus:ring-2 focus:ring-orange-500 focus:outline-none">
        </div>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1">Message to Seller</label>
          <textarea id="offerMessage" required rows="3" placeholder="Hi, is this still available?" 
                    class="w-full border border-gray-300 rounded-lg py-2 px-3 focus:ring-2 focus:ring-orange-500 focus:outline-none"></textarea>
        </div>

        <div id="offerResponse" class="hidden mb-4 text-sm text-center font-semibold text-green-600"></div>

        <div class="flex gap-3">
          <button type="button" onclick="closeOfferModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-full font-semibold hover:bg-gray-200 transition">Cancel</button>
          <button type="submit" class="flex-1 bg-orange-600 text-white py-2 rounded-full font-semibold hover:bg-orange-700 transition shadow-md">Send Offer</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // --- UI State Helpers ---
    function showProductsSpinner() {
      document.getElementById("products-spinner").classList.remove("hidden");
      document.getElementById("products-list").classList.add("opacity-20");
    }
    
    function hideProductsSpinner() {
      document.getElementById("products-spinner").classList.add("hidden");
      document.getElementById("products-list").classList.remove("opacity-20");
    }

    // --- Faculty/Department Cache & Lookup Utilities ---
    let facultiesCache = [];
    let departmentsCache = [];

    async function fetchFacultiesAndDepartments() {
      try {
        const [faculties, departments] = await Promise.all([
          fetch('https://examguide.onrender.com/api/faculties').then(r => r.json()),
          fetch('https://examguide.onrender.com/api/departments').then(r => r.json())
        ]);
        facultiesCache = faculties;
        departmentsCache = departments;
      } catch {
        facultiesCache = [];
        departmentsCache = [];
      }
    }

    function getFacultyName(faculty) {
      if (!faculty) return '';
      if (typeof faculty === 'object' && faculty.name) return faculty.name;
      if (typeof faculty === 'string') {
        const found = facultiesCache.find(f => f._id === faculty);
        return found ? found.name : faculty;
      }
      return '';
    }

    function getDepartmentName(department) {
      if (!department) return '';
      if (typeof department === 'object' && department.name) return department.name;
      if (typeof department === 'string') {
        const found = departmentsCache.find(d => d._id === department);
        return found ? found.name : department;
      }
      return '';
    }

    // Auth Check & Buyer Info
    let buyerProfile = null;
    async function checkAuth() {
      try {
        const token = localStorage.getItem("token");
        if (token) {
          const res = await fetch("https://examguide.onrender.com/api/auth/me", {
            headers: { "Authorization": "Bearer " + token }
          });
          if (res.ok) {
            const accBtn = document.getElementById("account-btn");
            accBtn.textContent = "Dashboard";
            accBtn.href = "/dashboard";
            buyerProfile = await res.json();
            return true;
          }
        }
      } catch (e) {}
      
      const accBtn = document.getElementById("account-btn");
      accBtn.textContent = "Sign In";
      accBtn.href = "/login";
      buyerProfile = null;
      return false;
    }

    // Demo Products (fallback)
    const demoProducts = [
      { id: 1, title: "Casio FX-991EX Calculator", price: "₦6,500", category: "Gadgets", posted: "3 hours ago", seller: "Blessing", rating: "4.6", images: ["https://flowbite.s3.amazonaws.com/docs/gallery/square/image-1.jpg"], description: "Like new." },
      { id: 2, title: "HP Elitebook Laptop 16GB RAM 512GB SSD", price: "₦180,000", category: "Electronics", posted: "1 day ago", seller: "Michael", rating: "4.9", images: ["https://flowbite.s3.amazonaws.com/docs/gallery/square/image-2.jpg"], description: "Slim, powerful." }
    ];

    // Render Products - REDESIGNED FOR TEMU/MODERN E-COMMERCE LOOK
    function renderProducts(products) {
      const list = document.getElementById("products-list");
      if (!products.length) {
        list.innerHTML = `<div class="col-span-full text-center text-gray-500 py-16">
                            <div class="text-4xl mb-2">🔍</div>
                            <h2 class="text-lg font-semibold text-gray-700">No products found</h2>
                            <p class="text-sm">Try adjusting your search criteria</p>
                          </div>`;
        return;
      }

      list.innerHTML = products.map(p => {
        const pId = p._id || p.id;
        const imgUrl = p.img || p.imageUrl || (Array.isArray(p.images) && p.images[0]) || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.title || 'Product') + '&background=eee&color=263159&rounded=true';
        const sellerName = p.seller || p.author || p.authorName || "Verified User";
        const postDate = p.posted || (p.date ? new Date(p.date).toLocaleDateString() : "");
        const safeTitle = (p.title || '').replace(/'/g, "\\'");

        return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-shadow group relative">
          <a href="sales/items.html?id=${pId}" class="block relative pt-[100%] bg-gray-50 overflow-hidden">
            <img src="${imgUrl}" class="absolute top-0 left-0 h-full w-full object-cover group-hover:scale-105 transition-transform duration-300" alt="${p.title}">
            <span class="absolute top-2 right-2 bg-white/90 backdrop-blur text-xs font-bold px-2 py-1 rounded-full text-gray-700 shadow-sm flex items-center gap-1">
              ⭐ ${p.rating || (p.likes || 4.5)}
            </span>
          </a>
          
          <div class="p-3 flex-1 flex flex-col">
            <a href="sales/items.html?id=${pId}">
              <h3 class="text-sm text-gray-800 line-clamp-2 leading-tight mb-1 font-medium group-hover:text-orange-600 transition-colors">${p.title}</h3>
            </a>
            
            <div class="mt-auto pt-2">
              <div class="flex items-end gap-1 mb-2">
                <span class="text-lg font-bold text-red-600 leading-none">${p.price}</span>
              </div>
              
              <div class="flex items-center justify-between text-[11px] text-gray-400 mb-3">
                <span class="truncate pr-2">${sellerName}</span>
                <span class="whitespace-nowrap">${postDate}</span>
              </div>

              <div class="flex gap-2">
                <button type="button" onclick="openOfferModal('${pId}', '${safeTitle}')" 
                        class="w-full bg-orange-50 text-orange-600 border border-orange-200 py-1.5 rounded-full text-xs font-bold hover:bg-orange-100 transition">
                  Make Offer
                </button>
              </div>
            </div>
          </div>
        </div>
      `}).join("");
    }
  
    async function fetchPublicProducts(query="") {
      showProductsSpinner();
      try {
        let url = "https://examguide.onrender.com/api/blogger-dashboard/public/listings";
        let res = await fetch(url);
        let products = [];
        if (res.ok) {
          products = await res.json();
          // Only show approved/published/active listings
          products = products.filter(
            p => (p.status && (p.status === "Published" || p.status === "Active")) || p.approved
          );
          if (query) {
            const q = query.toLowerCase();
            products = products.filter(p =>
              (p.title && p.title.toLowerCase().includes(q)) ||
              (p.category && p.category.toLowerCase().includes(q)) ||
              (p.summary && p.summary.toLowerCase().includes(q))
            );
          }
        }
        if (!products.length) products = demoProducts;
        renderProducts(products);
      } catch (e) {
        renderProducts(demoProducts);
      } finally {
        hideProductsSpinner();
      }
    }

    // OFFER MODAL logic
    let currentOfferProductId = null;
    let currentOfferProductTitle = null;
    
    window.openOfferModal = function(productId, productTitle){
      currentOfferProductId = productId;
      currentOfferProductTitle = productTitle;
      document.getElementById('offerProductId').value = productId;
      document.getElementById('sendOfferModal').classList.remove('hidden');

      let details = "";
      if (buyerProfile && buyerProfile.user) {
        const u = buyerProfile.user;
        let facultyDisplay = getFacultyName(u.faculty);
        let departmentDisplay = getDepartmentName(u.department);

        details = `
          <div class="font-bold text-gray-800 mb-1">Sending offer as:</div>
          <div class="grid grid-cols-2 gap-x-2 gap-y-1">
            <div><span class="font-medium text-gray-500">Name:</span> ${u.fullname || u.username}</div>
            <div><span class="font-medium text-gray-500">Phone:</span> ${u.phone || 'N/A'}</div>
            <div class="col-span-2"><span class="font-medium text-gray-500">Email:</span> ${u.email || ''}</div>
            <div class="col-span-2 truncate"><span class="font-medium text-gray-500">Dept:</span> ${departmentDisplay || facultyDisplay}</div>
          </div>
        `;
        document.getElementById('buyerDetails').innerHTML = details;
      } else {
        document.getElementById('buyerDetails').innerHTML = `<span class="block text-red-600 font-medium p-2 bg-red-50 rounded">⚠️ You must sign in for the seller to contact you.</span>`;
      }
    }

    window.closeOfferModal = function(){
      document.getElementById('sendOfferModal').classList.add('hidden');
      document.getElementById('offerForm').reset();
      document.getElementById('offerResponse').classList.add('hidden');
    }

    document.addEventListener("DOMContentLoaded", async function() {
      await fetchFacultiesAndDepartments();
      await checkAuth();
      fetchPublicProducts();

      document.getElementById("search-btn").onclick = function() {
        const q = document.getElementById("search-input").value.trim();
        fetchPublicProducts(q);
      };
      
      document.getElementById("search-input").addEventListener("keyup", function(e){
        if(e.key === "Enter"){
          document.getElementById("search-btn").click();
        }
      });

      // Offer form submit handler
      document.getElementById('offerForm').onsubmit = async function(e) {
        e.preventDefault();
        const productId = document.getElementById('offerProductId').value;
        const offerPrice = document.getElementById('offerPrice').value;
        const offerMessage = document.getElementById('offerMessage').value;
        const token = localStorage.getItem("token");
        
        // Gather buyer details
        let buyerDetails = "";
        if(buyerProfile && buyerProfile.user){
          const u = buyerProfile.user;
          buyerDetails = {
            id: u._id,
            name: u.fullname || u.username,
            email: u.email,
            phone: u.phone,
            faculty: getFacultyName(u.faculty),
            department: getDepartmentName(u.department)
          };
        }
        
        // Compose full message to seller
        const fullMessage = `
Offer from: ${buyerDetails.name || "Guest"}
Email: ${buyerDetails.email || "N/A"}
Phone: ${buyerDetails.phone || "N/A"}
Faculty: ${buyerDetails.faculty || ""}
Department: ${buyerDetails.department || ""}
Product: ${currentOfferProductTitle || ""}
---
${offerMessage}
        `.trim();

        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = "Sending...";
        btn.disabled = true;

        try {
          const res = await fetch("https://examguide.onrender.com/api/offers", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(token ? { "Authorization": "Bearer " + token } : {})
            },
            body: JSON.stringify({
              productId,
              offerPrice,
              message: fullMessage,
              buyer: buyerDetails
            })
          });
          
          const responseDiv = document.getElementById('offerResponse');
          if (res.ok) {
            responseDiv.textContent = "Offer sent successfully!";
            responseDiv.className = "mb-4 text-sm text-center font-semibold text-green-600 block";
            setTimeout(closeOfferModal, 1500);
          } else {
            throw new Error("Failed");
          }
        } catch (err) {
          const responseDiv = document.getElementById('offerResponse');
          responseDiv.textContent = "Could not send offer. Please try again.";
          responseDiv.className = "mb-4 text-sm text-center font-semibold text-red-600 block";
        } finally {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      }
    });
  </script>
</body>
</html>
