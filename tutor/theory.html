
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.80">
  <title>OAU ExamGuard | Theory Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Add jsPDF & html2canvas for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- MathJax v3: render LaTeX -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        packages: {'[+]': ['noerrors']}
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      overflow-x: hidden;
    }

    .report-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #fbbf24 100%);
      color: white;
      padding: 1rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 50;
      flex-shrink: 0;
    }

    .navbar-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.25rem;
    }

    .navbar-brand img {
      height: 2.5rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .brand-oau {
      color: white;
    }

    .brand-exam {
      background: linear-gradient(135deg, #fbbf24, #fcd34d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .exam-type-badge {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ===== LEFT SIDEBAR ===== */
    .sidebar-left {
      width: 280px;
      background: white;
      border-right: 1px solid #e5e7eb;
      padding: 1.5rem;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .sidebar-left::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-left::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .sidebar-left::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .sidebar-left::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1f2937;
      margin-bottom: 1.5rem;
    }

    .score-card {
      background: linear-gradient(135deg, #fbbf24 0%, #fcd34d 100%);
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }

    .score-card-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: #1f2937;
      line-height: 1;
    }

    .score-card-label {
      font-size: 0.75rem;
      color: #78350f;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
      font-weight: 700;
    }

    .score-card-percent {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1f2937;
      margin-top: 0.75rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-item {
      background: #f9fafb;
      border: 2px solid #f3f4f6;
      border-radius: 0.9rem;
      padding: 1rem;
      text-align: center;
    }

    .stat-number {
      font-size: 1.75rem;
      font-weight: 900;
      color: #fbbf24;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.4rem;
      font-weight: 600;
    }

    .sidebar-divider {
      height: 1px;
      background: #f3f4f6;
      margin: 1.5rem 0;
    }

    .student-info {
      background: #f9fafb;
      border-radius: 0.9rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-icon {
      width: 1.75rem;
      height: 1.75rem;
      background: #fbbf24;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
      font-weight: 700;
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .info-text {
      flex: 1;
      color: #4b5563;
      word-break: break-word;
    }

    .feedback-box {
      background: #fffbeb;
      border: 2px solid #fbbf24;
      border-radius: 0.9rem;
      padding: 1rem;
      text-align: center;
    }

    .feedback-icon {
      font-size: 1.5rem;
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .feedback-text {
      font-size: 0.9rem;
      color: #78350f;
      font-weight: 600;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-sidebar {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-retake {
      background: #e0e7ff;
      color: #3730a3;
    }

    .btn-retake:hover {
      background: #c7d2fe;
    }

    .btn-download {
      background: #fbbf24;
      color: #1f2937;
    }

    .btn-download:hover {
      background: #fcd34d;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
    }

    /* ===== CENTER CONTENT ===== */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      background: white;
    }

    .content-area::-webkit-scrollbar {
      width: 8px;
    }

    .content-area::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    .content-area::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .content-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid #f3f4f6;
    }

    .content-title {
      font-size: 1.75rem;
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .content-subject {
      font-size: 1rem;
      color: #6b7280;
      font-weight: 600;
    }

    .question-card {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.2s ease;
    }

    .question-card.graded {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .question-card.pending {
      border-color: #3b82f6;
      background: #f0f9ff;
    }

    .question-card:hover {
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .question-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      background: #fbbf24;
      color: #1f2937;
      border-radius: 50%;
      font-weight: 900;
      margin-right: 1rem;
      flex-shrink: 0;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 1.25rem;
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
    }

    .answer-section {
      margin-bottom: 1rem;
    }

    .answer-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .answer-content {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .answer-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .answer-user {
      background: #dbeafe;
      color: #1e3a8a;
    }

    .answer-correct {
      background: #bbf7d0;
      color: #166534;
    }

    .answer-wrong {
      background: #fee2e2;
      color: #991b1b;
    }

    .answer-pending {
      background: #dbeafe;
      color: #1e40af;
    }

    .theory-answer-display {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-top: 0.5rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .theory-answer-display img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 0.5rem;
    }

    .feedback-section {
      background: #fffbeb;
      border-left: 4px solid #fbbf24;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
    }

    .feedback-header {
      font-weight: 700;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .feedback-body {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .loading-spinner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      color: #6b7280;
      padding: 3rem;
    }

    .loading-spinner i {
      font-size: 2.5rem;
      color: #fbbf24;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee2e2;
      border: 2px solid #ef4444;
      border-radius: 0.75rem;
      padding: 1.5rem;
      color: #991b1b;
      text-align: center;
      font-weight: 600;
    }

    .max-marks {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }

    .score-badge {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .sidebar-left {
        width: 240px;
        padding: 1rem;
      }

      .content-area {
        padding: 1.5rem;
      }

      .question-card {
        padding: 1.25rem;
      }

      .question-text {
        font-size: 1rem;
      }
    }

    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
      }

      .sidebar-left {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
        max-height: 350px;
      }

      .content-area {
        padding: 1.25rem;
      }

      .navbar-inner {
        flex-direction: column;
        gap: 1rem;
      }

      .navbar-brand {
        font-size: 1.1rem;
      }

      .navbar-brand img {
        height: 2rem;
      }

      .content-title {
        font-size: 1.5rem;
      }

      .question-card {
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .question-text {
        font-size: 0.95rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: row;
        gap: 0.5rem;
      }

      .btn-sidebar {
        flex: 1;
        font-size: 0.85rem;
        padding: 0.65rem;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 0.75rem 1rem;
      }

      .navbar-brand {
        font-size: 0.95rem;
      }

      .navbar-brand img {
        height: 1.75rem;
      }

      .sidebar-left {
        padding: 1rem;
        max-height: 300px;
      }

      .content-area {
        padding: 1rem;
      }

      .content-title {
        font-size: 1.25rem;
      }

      .content-subject {
        font-size: 0.9rem;
      }

      .question-card {
        padding: 0.85rem;
      }

      .question-number {
        width: 1.75rem;
        height: 1.75rem;
        font-size: 0.85rem;
        margin-right: 0.75rem;
      }

      .question-text {
        font-size: 0.9rem;
      }

      .answer-label {
        font-size: 0.8rem;
      }

      .score-card-number {
        font-size: 2rem;
      }

      .score-card-percent {
        font-size: 1.25rem;
      }

      .info-row {
        font-size: 0.85rem;
      }

      .action-buttons {
        flex-direction: column;
        gap: 0.5rem;
      }

      .btn-sidebar {
        font-size: 0.8rem;
        padding: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="report-wrapper">
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-inner">
        <div class="navbar-brand">
          <img src="../logo.png" alt="OAU ExamGuard">
          <span><span class="brand-oau">OAU</span> <span class="brand-exam">ExamGuard</span></span>
        </div>
        <span class="exam-type-badge">📄 THEORY</span>
      </div>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
      <!-- LEFT SIDEBAR -->
      <div class="sidebar-left">
        <div class="sidebar-title">Score Summary</div>

        <div class="score-card">
          <div class="score-card-number" id="score-number">-</div>
          <div class="score-card-label">Total Score</div>
          <div class="score-card-percent" id="score-percent">-</div>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-number" id="graded-count">0</div>
            <div class="stat-label">Graded</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="pending-count">0</div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="total-questions">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="avg-score">0%</div>
            <div class="stat-label">Avg/Question</div>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-title">Student Information</div>

        <div class="student-info">
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-user"></i></div>
            <div class="info-text" id="student-name">-</div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-id-card"></i></div>
            <div class="info-text" id="student-regnum">-</div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-book"></i></div>
            <div class="info-text" id="exam-subject">-</div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-clock"></i></div>
            <div class="info-text" id="exam-time">-</div>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="feedback-box">
          <div class="feedback-icon"><i class="fas fa-star"></i></div>
          <div class="feedback-text" id="score-feedback">-</div>
        </div>

        <div class="action-buttons">
          <button class="btn-sidebar btn-retake" onclick="location.href='main-exampage'">
            <i class="fas fa-redo-alt"></i> Retake Exam
          </button>
          <button class="btn-sidebar btn-download" id="download-pdf-btn">
            <i class="fas fa-download"></i> Download PDF
          </button>
        </div>
      </div>

      <!-- CENTER CONTENT -->
      <div class="content-area" id="results-list">
        <div class="loading-spinner">
          <i class="fas fa-spinner"></i>
          <p style="font-weight: 600;">Loading theory results...</p>
        </div>
      </div>
    </div>
  </div>

<script>
  "use strict";

  const API_BASE = "https://examguide.onrender.com";
  let attemptData = null;
  let studentData = null;
  let allAnswers = [];

  // ============ UTILITY FUNCTIONS ============
  function getToken() {
    return localStorage.getItem("student_jwt_token") || "";
  }

  function getFromLS(key) {
    try {
      const data = localStorage.getItem(key);
      return data ? JSON.parse(data) : null;
    } catch (err) {
      console.warn(`Failed to parse ${key}:`, err);
      return null;
    }
  }

  // ============ API CALLS ============
  async function fetchStudentProfile() {
    try {
      const token = getToken();
      if (!token) throw new Error("No token");
      const res = await fetch(API_BASE + "/api/auth/me", {
        headers: { Authorization: "Bearer " + token }
      });
      if (!res.ok) throw new Error("Not authenticated");
      return await res.json();
    } catch (err) {
      console.error("Profile fetch error:", err);
      return null;
    }
  }

  async function fetchTheoryAttempt(attemptId) {
    try {
      if (!attemptId) throw new Error("No attempt ID");
      const token = getToken();
      const res = await fetch(`${API_BASE}/api/theory-attempts/${attemptId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error("Attempt not found");
      return await res.json();
    } catch (err) {
      console.error("Fetch attempt error:", err);
      return null;
    }
  }

  async function fetchTheoryAnswer(answerId) {
    try {
      if (!answerId) throw new Error("No answer ID");
      const token = getToken();
      const res = await fetch(`${API_BASE}/api/theory-answers/${answerId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) throw new Error("Answer not found");
      return await res.json();
    } catch (err) {
      console.error("Fetch answer error:", err);
      return null;
    }
  }

  async function fetchAllAttemptAnswers(attemptId) {
    try {
      if (!attemptId) throw new Error("No attempt ID");
      const token = getToken();
      
      // Fetch the attempt first to get all answer IDs
      const attempt = await fetchTheoryAttempt(attemptId);
      if (!attempt) throw new Error("Attempt not found");

      // Fetch all answers in parallel
      const answerPromises = attempt.answers.map(answerRef => 
        fetchTheoryAnswer(answerRef.answer)
      );
      const answers = await Promise.all(answerPromises);
      return answers.filter(a => a !== null);
    } catch (err) {
      console.error("Fetch all answers error:", err);
      return [];
    }
  }

  // ============ STRIP HTML ============
  function stripHtml(html) {
    const tmp = document.createElement("DIV");
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || "";
  }

  // ============ RENDER REPORT ============
  async function renderReport() {
    try {
      console.log("Rendering theory report...");

      // Get attempt ID from URL or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      let attemptId = urlParams.get('attemptId') || localStorage.getItem('theory_attempt_id');

      if (!attemptId) {
        throw new Error("No attempt ID provided");
      }

      // Fetch student profile
      studentData = await fetchStudentProfile();
      if (!studentData) {
        throw new Error("Failed to fetch student profile");
      }

      // Fetch attempt data
      attemptData = await fetchTheoryAttempt(attemptId);
      if (!attemptData) {
        throw new Error("Failed to fetch attempt");
      }

      // Fetch all answers
      allAnswers = await fetchAllAttemptAnswers(attemptId);
      console.log("Fetched answers:", allAnswers);

      // Populate sidebar
      populateSidebar();

      // Populate content area
      populateContent();

      // Setup action buttons
      setupActionButtons();

      // Render math
      if (window.MathJax && MathJax.typesetPromise) {
        await MathJax.typesetPromise();
      }

    } catch (err) {
      console.error("Render report error:", err);
      showError(err.message);
    }
  }

  function populateSidebar() {
    const sidebar = document.querySelector('.sidebar-left');
    
    // Score Card
    const scoreHtml = `
      <div class="score-card">
        <div class="score-card-number">${attemptData.totalScore || 0}</div>
        <div class="score-card-label">Total Score</div>
        <div class="score-card-percent">${attemptData.percentage || 0}%</div>
      </div>
    `;

    // Stats Grid
    const statsHtml = `
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number">${allAnswers.length}</div>
          <div class="stat-label">Questions</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">${attemptData.maxScore || 0}</div>
          <div class="stat-label">Max Score</div>
        </div>
      </div>
    `;

    // Student Info
    const submittedAt = attemptData.submittedAt ? new Date(attemptData.submittedAt).toLocaleString() : "—";
    const gradedAt = attemptData.gradedAt ? new Date(attemptData.gradedAt).toLocaleString() : "—";

    const infoHtml = `
      <div class="student-info">
        <div class="info-row">
          <div class="info-icon">👤</div>
          <div class="info-text">${studentData.fullname || studentData.username}</div>
        </div>
        <div class="info-row">
          <div class="info-icon">🆔</div>
          <div class="info-text">${studentData.studentId || studentData.email}</div>
        </div>
        <div class="info-row">
          <div class="info-icon">📧</div>
          <div class="info-text">${studentData.email}</div>
        </div>
      </div>
    `;

    // Status
    const statusClass = attemptData.status === 'graded' ? 'success' : 'warning';
    const statusText = attemptData.status === 'graded' ? '✓ Graded' : '⏳ Pending';

    const feedbackHtml = `
      <div class="feedback-box">
        <div class="feedback-icon">${attemptData.status === 'graded' ? '✓' : '⏳'}</div>
        <div class="feedback-text">${statusText}</div>
      </div>
    `;

    // Action buttons
    const buttonsHtml = `
      <div class="action-buttons">
        <button class="btn-sidebar btn-download" id="download-pdf-btn">
          <i class="fas fa-download"></i> Download PDF
        </button>
        <button class="btn-sidebar btn-retake" id="retake-btn">
          <i class="fas fa-redo"></i> Retake Exam
        </button>
      </div>
    `;

    sidebar.innerHTML = `
      <h3 class="sidebar-title">📊 Results Summary</h3>
      ${scoreHtml}
      ${statsHtml}
      <div class="sidebar-divider"></div>
      <h3 class="sidebar-title">👤 Student Info</h3>
      ${infoHtml}
      <div class="sidebar-divider"></div>
      ${feedbackHtml}
      ${buttonsHtml}
    `;
  }

  function populateContent() {
    const contentArea = document.querySelector('.content-area');

    // Header
    const headerHtml = `
      <div class="content-header">
        <div class="content-title">
          <i class="fas fa-file-alt"></i>
          Theory Exam Report
        </div>
        <div class="content-subject">
          Submitted: ${new Date(attemptData.submittedAt).toLocaleString()}
        </div>
      </div>
    `;

    // Questions and Answers
    let questionsHtml = '';
    allAnswers.forEach((answer, idx) => {
      const cardClass = answer.isGraded ? 'graded' : 'pending';
      const scoreDisplay = answer.isGraded ? `${answer.finalScore}/${answer.question.maxMarks}` : 'Pending';
      const scoringMethod = answer.scoringMethod === 'ai' ? '🤖 AI Graded' : answer.scoringMethod === 'manual' ? '👤 Manual' : '⚙️ Auto';

      // Question text
      const questionText = stripHtml(answer.question.question);

      // Answer display
      let answerDisplay = '';
      if (answer.answerType === 'text') {
        answerDisplay = `<div class="theory-answer-display">${answer.answerText}</div>`;
      } else if (answer.answerType === 'image') {
        answerDisplay = `<div class="theory-answer-display"><img src="${answer.answerImageUrl}" alt="Answer image" /></div>`;
      }

      // AI Feedback
      let feedbackDisplay = '';
      if (answer.aiFeedback) {
        feedbackDisplay = `
          <div class="feedback-section">
            <div class="feedback-header">
              <i class="fas fa-lightbulb"></i>
              AI Feedback
            </div>
            <div class="feedback-body">${answer.aiFeedback}</div>
          </div>
        `;
      }

      questionsHtml += `
        <div class="question-card ${cardClass}">
          <div class="question-text">
            <span class="question-number">${idx + 1}</span>
            <div>
              <div>${questionText}</div>
              <div style="font-size: 0.85rem; color: #6b7280; margin-top: 0.5rem;">
                Max Marks: ${answer.question.maxMarks}
              </div>
            </div>
          </div>

          <div class="answer-section">
            <div class="answer-label">Your Answer</div>
            ${answerDisplay}
          </div>

          <div class="answer-section" style="margin-top: 1.5rem;">
            <div class="answer-label">Grading Details</div>
            <div class="answer-content">
              <span class="answer-pill answer-user">
                <i class="fas fa-star"></i>
                Score: ${scoreDisplay}
              </span>
              <span class="answer-pill" style="background: #f3e8ff; color: #6b21a8;">
                ${scoringMethod}
              </span>
            </div>
          </div>

          ${answer.aiExplanation ? `
            <div style="margin-top: 1rem; padding: 0.75rem; background: #f0f9ff; border-left: 3px solid #3b82f6; border-radius: 0.5rem;">
              <div style="font-size: 0.85rem; font-weight: 600; color: #1e40af; margin-bottom: 0.25rem;">
                <i class="fas fa-info-circle"></i> AI Explanation
              </div>
              <div style="font-size: 0.9rem; color: #1e40af;">${answer.aiExplanation}</div>
            </div>
          ` : ''}

          ${feedbackDisplay}
        </div>
      `;
    });

    contentArea.innerHTML = headerHtml + questionsHtml;
  }

  function setupActionButtons() {
    const downloadBtn = document.getElementById('download-pdf-btn');
    const retakeBtn = document.getElementById('retake-btn');

    if (downloadBtn) {
      downloadBtn.addEventListener('click', downloadPDF);
    }

    if (retakeBtn) {
      retakeBtn.addEventListener('click', () => {
        if (confirm('Are you sure you want to retake this exam?')) {
          // Navigate back to exam start
          window.location.href = 'cbt.html';
        }
      });
    }
  }

  async function downloadPDF() {
    try {
      const element = document.querySelector('.main-layout');
      const opt = {
        margin: 10,
        filename: `theory-report-${attemptData._id}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
      };

      // Use html2pdf library
      if (window.html2pdf) {
        window.html2pdf().set(opt).from(element).save();
      } else {
        alert('PDF generation library not loaded. Please try again.');
      }
    } catch (err) {
      console.error("PDF download error:", err);
      alert('Error generating PDF: ' + err.message);
    }
  }

  function showError(message) {
    const contentArea = document.querySelector('.content-area');
    contentArea.innerHTML = `
      <div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 1rem;">
        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #dc2626;"></i>
        <h2 style="color: #1f2937; font-size: 1.5rem;">Error Loading Report</h2>
        <p style="color: #6b7280; text-align: center;">${message}</p>
        <button onclick="window.history.back()" style="padding: 0.75rem 1.5rem; background: #fbbf24; color: #1f2937; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;">
          Go Back
        </button>
      </div>
    `;
  }

  // ============ PAGE INITIALIZATION ============
  window.addEventListener('DOMContentLoaded', () => {
    console.log("Theory report page loading...");
    renderReport();
  });

  // Set current year in footer
  document.addEventListener('DOMContentLoaded', () => {
    const yearElements = document.querySelectorAll('.year');
    yearElements.forEach(el => {
      el.textContent = new Date().getFullYear();
    });
  });
</script>
</body>
</html>
