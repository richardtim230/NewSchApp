
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.80">
  <title>OAU ExamGuard | Theory Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Add jsPDF & html2canvas for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- MathJax v3: render LaTeX -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        packages: {'[+]': ['noerrors']}
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      overflow-x: hidden;
    }

    .report-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #fbbf24 100%);
      color: white;
      padding: 1rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      z-index: 50;
      flex-shrink: 0;
    }

    .navbar-inner {
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      font-size: 1.25rem;
    }

    .navbar-brand img {
      height: 2.5rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .brand-oau {
      color: white;
    }

    .brand-exam {
      background: linear-gradient(135deg, #fbbf24, #fcd34d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .exam-type-badge {
      display: inline-block;
      padding: 0.4rem 0.9rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ===== LEFT SIDEBAR ===== */
    .sidebar-left {
      width: 280px;
      background: white;
      border-right: 1px solid #e5e7eb;
      padding: 1.5rem;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .sidebar-left::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-left::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .sidebar-left::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .sidebar-left::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #1f2937;
      margin-bottom: 1.5rem;
    }

    .score-card {
      background: linear-gradient(135deg, #fbbf24 0%, #fcd34d 100%);
      border-radius: 1rem;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }

    .score-card-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: #1f2937;
      line-height: 1;
    }

    .score-card-label {
      font-size: 0.75rem;
      color: #78350f;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
      font-weight: 700;
    }

    .score-card-percent {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1f2937;
      margin-top: 0.75rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-item {
      background: #f9fafb;
      border: 2px solid #f3f4f6;
      border-radius: 0.9rem;
      padding: 1rem;
      text-align: center;
    }

    .stat-number {
      font-size: 1.75rem;
      font-weight: 900;
      color: #fbbf24;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.4rem;
      font-weight: 600;
    }

    .sidebar-divider {
      height: 1px;
      background: #f3f4f6;
      margin: 1.5rem 0;
    }

    .student-info {
      background: #f9fafb;
      border-radius: 0.9rem;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;

    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-icon {
      width: 1.75rem;
      height: 1.75rem;
      background: #fbbf24;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
      font-weight: 700;
      flex-shrink: 0;
      font-size: 0.9rem;
    }

    .info-text {
      flex: 1;
      color: #4b5563;
      word-break: break-word;
    }

    .feedback-box {
      background: #fffbeb;
      border: 2px solid #fbbf24;
      border-radius: 0.9rem;
      padding: 1rem;
      text-align: center;
    }

    .feedback-icon {
      font-size: 1.5rem;
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .feedback-text {
      font-size: 0.9rem;
      color: #78350f;
      font-weight: 600;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-sidebar {
      padding: 0.75rem 1rem;

      border-radius: 0.75rem;
      font-weight: 700;
      font-size: 0.9rem;

    .btn-retake {

    .btn-retake:hover {

    .btn-download {

    }

    /* ===== CENTER CONTENT ===== */
    .content-area {

      overflow-y: auto;
      padding: 2rem;
      background: white;

    .content-area::-webkit-scrollbar {

    .content-area::-webkit-scrollbar-track {

    }

    .content-area::-webkit-scrollbar-thumb:hover {

    .content-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid #f3f4f6;
    }

    .content-title {
      font-size: 1.75rem;
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .content-subject {

      color: #6b7280;
      font-weight: 600;
    }

    .question-card {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 1rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.2s ease;
    }

    .question-card.graded {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .question-card.pending {
      border-color: #3b82f6;
      background: #f0f9ff;
    }

    .question-card:hover {

    }

    .question-number {
      display: inline-flex;
      align-items: center;

      margin-right: 1rem;

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;

      display: flex;

    .answer-label {

      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .answer-content {

    .answer-user {

      color: #1e3a8a;
    }

    .answer-correct {
      background: #bbf7d0;
      color: #166534;
    }

    .answer-wrong {
      background: #fee2e2;
      color: #991b1b;
    }

    .answer-pending {
      background: #dbeafe;
      color: #1e40af;
    }

    .theory-answer-display {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-top: 0.5rem;
      max-height: 300px;
      overflow-y: auto;
    }

    .theory-answer-display img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 0.5rem;
    }

    .feedback-section {
      background: #fffbeb;
      border-left: 4px solid #fbbf24;
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
    }

    .feedback-header {
      font-weight: 700;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .feedback-body {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .loading-spinner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      color: #6b7280;
      padding: 3rem;
    }

    .loading-spinner i {
      font-size: 2.5rem;
      color: #fbbf24;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee2e2;
      border: 2px solid #ef4444;
      border-radius: 0.75rem;
      padding: 1.5rem;
      color: #991b1b;
      text-align: center;
      font-weight: 600;
    }

    .max-marks {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }

    .score-badge {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .sidebar-left {
        width: 240px;
        padding: 1rem;
      }

      .content-area {
        padding: 1.5rem;
      }

      .question-card {
        padding: 1.25rem;
      }

      .question-text {
        font-size: 1rem;
      }
    }

    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
      }

      .sidebar-left {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
        max-height: 350px;
      }

      .content-area {
        padding: 1.25rem;
      }

      .navbar-inner {
        flex-direction: column;
        gap: 1rem;
      }

      .navbar-brand {
        font-size: 1.1rem;
      }

      .navbar-brand img {
        height: 2rem;
      }

      .content-title {
        font-size: 1.5rem;
      }

      .question-card {
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .question-text {
        font-size: 0.95rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: row;
        gap: 0.5rem;
      }

      .btn-sidebar {

        font-size: 0.85rem;

      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 0.75rem 1rem;
      }

      .navbar-brand {

      }

      .navbar-brand img {
        height: 1.75rem;
      }

      .sidebar-left {
        padding: 1rem;
        max-height: 300px;
      }

      .content-area {
        padding: 1rem;
      }

      .content-title {
        font-size: 1.25rem;
      }

      .content-subject {
        font-size: 0.9rem;
      }

      .question-card {
        padding: 0.85rem;
      }

      .question-number {
        width: 1.75rem;
        height: 1.75rem;
        font-size: 0.85rem;
        margin-right: 0.75rem;
      }

      .question-text {
        font-size: 0.9rem;
      }

      .answer-label {
        font-size: 0.8rem;
      }

      .score-card-number {
        font-size: 2rem;
      }

      .score-card-percent {
        font-size: 1.25rem;
      }

      .info-row {
        font-size: 0.85rem;
      }

      .action-buttons {
        flex-direction: column;
        gap: 0.5rem;
      }

      .btn-sidebar {
        font-size: 0.8rem;

  </style>
</head>
<body>
  <div class="report-wrapper">
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-inner">
        <div class="navbar-brand">
          <img src="../logo.png" alt="OAU ExamGuard">
          <span><span class="brand-oau">OAU</span> <span class="brand-exam">ExamGuard</span></span>
        </div>
        <span class="exam-type-badge">📄 THEORY</span>
      </div>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
      <!-- LEFT SIDEBAR -->
      <div class="sidebar-left">
        <div class="sidebar-title">Score Summary</div>

        <div class="score-card">
          <div class="score-card-number" id="score-number">-</div>
          <div class="score-card-label">Total Score</div>
          <div class="score-card-percent" id="score-percent">-</div>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-number" id="graded-count">0</div>
            <div class="stat-label">Graded</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="pending-count">0</div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="total-questions">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="avg-score">0%</div>
            <div class="stat-label">Avg/Question</div>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-title">Student Information</div>

        <div class="student-info">
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-user"></i></div>
            <div class="info-text" id="student-name">-</div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-id-card"></i></div>
            <div class="info-text" id="student-regnum">-</div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-book"></i></div>
            <div class="info-text" id="exam-subject">-</div>
          </div>
          <div class="info-row">
            <div class="info-icon"><i class="fas fa-clock"></i></div>
            <div class="info-text" id="exam-time">-</div>
          </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="feedback-box">
          <div class="feedback-icon"><i class="fas fa-star"></i></div>
          <div class="feedback-text" id="score-feedback">-</div>
        </div>

        <div class="action-buttons">
          <button class="btn-sidebar btn-retake" onclick="location.href='main-exampage'">
            <i class="fas fa-redo-alt"></i> Retake Exam
          </button>
          <button class="btn-sidebar btn-download" id="download-pdf-btn">
            <i class="fas fa-download"></i> Download PDF
          </button>
        </div>
      </div>

      <!-- CENTER CONTENT -->
      <div class="content-area" id="results-list">
        <div class="loading-spinner">
          <i class="fas fa-spinner"></i>
          <p style="font-weight: 600;">Loading theory results...</p>
        </div>
      </div>
    </div>
  </div>

<script>
    "use strict";

    const API_BASE = "https://examguide.onrender.com";

    // ============ DATA RETRIEVAL ============
    function getFromLS(key) {
      try {
        const data = localStorage.getItem(key) || sessionStorage.getItem(key);
        return data ? JSON.parse(data) : null;
      } catch (err) {
        console.warn(`Failed to parse ${key}:`, err);
        return null;
      }
    }

    function getFromLSString(key) {
      try {
        return localStorage.getItem(key) || sessionStorage.getItem(key) || null;
      } catch (err) {
        console.warn(`Failed to get ${key}:`, err);
        return null;
      }
    }

    let attemptId = getFromLSString('cbt_attempt_id') || getFromLSString('theory_attempt_id');

    console.log("Theory Attempt ID:", attemptId);

    // ============ API CALLS ============
    async function fetchTheoryAttempt(attemptId) {
      try {
        if (!attemptId) return null;
        const token = localStorage.getItem("student_jwt_token");
        console.log("Fetching theory attempt with ID:", attemptId);
        const res = await fetch(`${API_BASE}/api/theory-attempts/${attemptId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          console.error("Failed to fetch attempt, status:", res.status);
          return null;
        }
        const data = await res.json();
        console.log("Theory attempt data:", data);
        return data;
      } catch (err) {
        console.error("Fetch theory attempt error:", err);
        return null;
      }
    }

    // ============ UTILITY FUNCTIONS ============
    function getTimeString(iso) {
      if (!iso) return "";
      try {
        const d = new Date(iso);
        return d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
      } catch (err) {
        return iso;
      }
    }

    function stripHtml(html) {
      const tmp = document.createElement("DIV");
      tmp.innerHTML = html || "";
      return tmp.textContent || tmp.innerText || "";
    }

    function normalizeQuestionMath(html) {
      if (!html || typeof html !== 'string') return html;
      let s = html.replace(/\\\\/g, '\\');
      if (/\\\(|\\\[|\$\$?/.test(s)) return s;
      const cmdRegex = /\\(?:frac|sqrt|sum|int|lim|left|right|cdot|times|pi|alpha|beta|gamma|theta|log|ln|Delta|delta)(?:\{[^}]*\}|\^[^{\s]+|\_[^{\s]+)*/g;
      s = s.replace(cmdRegex, function(m) { return `\\(${m}\\)`; });
      const expRegex = /([A-Za-z0-9])\^(?:\{[^}]+\}|\d+)/g;
      s = s.replace(expRegex, function(m) { return `\\(${m}\\)`; });
      const subRegex = /([A-Za-z0-9])_(?:\{[^}]+\}|\d+)/g;
      s = s.replace(subRegex, function(m) { return `\\(${m}\\)`; });
      return s;
    }

    function feedbackRemark(pct) {
      if (pct === 100) return "🎉 Excellent! You aced it!";
      if (pct >= 80) return "👏 Great work! Almost perfect.";
      if (pct >= 60) return "📚 Good. Keep studying!";
      if (pct >= 40) return "💪 Keep practicing!";
      return "🔄 Review & try again!";
    }

    // ============ UPDATE SCORE CARD ============
    function updateScoreCard(scores) {
      document.getElementById('score-number').textContent = scores.scoreDisplay || `${scores.obtained}/${scores.total}`;
      document.getElementById('graded-count').textContent = scores.graded;
      document.getElementById('pending-count').textContent = scores.pending;
      document.getElementById('total-questions').textContent = scores.total;
      document.getElementById('avg-score').textContent = scores.avgScore;
      document.getElementById('score-percent').textContent = `${scores.percent}%`;
      document.getElementById('score-feedback').textContent = feedbackRemark(scores.percent);
    }

    // ============ RENDER THEORY RESULTS ============
    async function renderTheoryResults(attempt) {
      if (!attempt) {
        document.getElementById('results-list').innerHTML = `
          <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> Failed to load theory attempt data.
          </div>
        `;
        return { obtained: 0, total: 0, graded: 0, pending: 0, percent: 0, avgScore: "0%", scoreDisplay: "0/0" };
      }

      const resultsList = document.getElementById('results-list');
      const subject = attempt.examSet?.subject || attempt.subject || "Theory Exam";
      
      // Update student info in sidebar
      document.getElementById('student-name').textContent = attempt.student?.name || attempt.studentName || "-";
      document.getElementById('student-regnum').textContent = attempt.student?.registrationNumber || attempt.regNum || "-";
      document.getElementById('exam-subject').textContent = subject;
      document.getElementById('exam-time').textContent = getTimeString(attempt.submittedAt || attempt.completedAt);

      resultsList.innerHTML = `
        <div class="content-header">
          <div class="content-title">
            <i class="fas fa-chart-pie" style="color: #fbbf24;"></i> Theory Exam Results
          </div>
          <div class="content-subject">${subject}</div>
        </div>
      `;

      const allAnswers = attempt.answers || [];
      
      if (!allAnswers || allAnswers.length === 0) {
        resultsList.innerHTML += `
          <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> No answers found.
          </div>
        `;
        return { obtained: 0, total: 0, graded: 0, pending: 0, percent: 0, avgScore: "0%", scoreDisplay: "0/0" };
      }

      let totalMarks = 0;
      let obtainedMarks = 0;
      let pendingCount = 0;
      let gradedCount = 0;

      for (let i = 0; i < allAnswers.length; i++) {
        const ans = allAnswers[i];
        const question = ans.question || {};
        const qNum = i + 1;
        const maxMarks = question.maxMarks || ans.maxMarks || 10;
        const earnedMarks = ans.score !== undefined ? ans.score : 0;
        const isGraded = ans.isGraded !== false;

        totalMarks += maxMarks;
        if (isGraded) {
          obtainedMarks += earnedMarks;
          gradedCount++;
        } else {
          pendingCount++;
        }

        const statusClass = isGraded ? "graded" : "pending";
        const statusLabel = !isGraded ? "Pending Review" : `${earnedMarks}/${maxMarks}`;

        let answerDisplay = `<p>${stripHtml(ans.answerText) || "No text answer"}</p>`;
        
        if (ans.answerImage) {
          answerDisplay += `<img src="${ans.answerImage}" alt="Student answer" style="max-width: 100%; margin-top: 0.5rem; cursor: pointer;" onclick="window.open(this.src)">`;
        }

        const feedbackSection = ans.feedback ? `
          <div class="feedback-section">
            <div class="feedback-header">
              <i class="fas fa-comment-dots"></i> Instructor Feedback
            </div>
            <div class="feedback-body">${ans.feedback}</div>
          </div>
        ` : "";

        resultsList.innerHTML += `
          <div class="question-card ${statusClass}">
            <div class="question-text">
              <span class="question-number">${qNum}</span>
              <div>
                <div>${normalizeQuestionMath(stripHtml(question.text || "Question")) || "Question"}</div>
                <div class="max-marks">Max Marks: <strong>${maxMarks}</strong></div>
              </div>
            </div>
            
            <div class="answer-section">
              <div class="answer-label">Your Answer</div>
              <div class="theory-answer-display">
                ${answerDisplay}
              </div>
            </div>

            <div class="answer-section">
              <div class="answer-label">Score</div>
              <div class="answer-content">
                <span class="score-badge ${isGraded ? 'answer-correct' : 'answer-pending'}">
                  ${statusLabel}
                </span>
              </div>
            </div>

            ${feedbackSection}
          </div>
        `;
      }

      const percentage = totalMarks > 0 ? Math.round((obtainedMarks / totalMarks) * 100) : 0;
      const avgPerQuestion = allAnswers.length > 0 ? Math.round((obtainedMarks / allAnswers.length) * 100) : 0;

      const scores = {
        obtained: obtainedMarks,
        total: totalMarks,
        graded: gradedCount,
        pending: pendingCount,
        percent: percentage,
        avgScore: `${avgPerQuestion}%`,
        scoreDisplay: `${obtainedMarks}/${totalMarks}`
      };

      if (window.MathJax && MathJax.typesetPromise) {
        try {
          await MathJax.typesetPromise([resultsList]);
        } catch (err) {
          console.warn("MathJax typeset error:", err && err.message);
        }
      }

      return scores;
    }

    // ============ MAIN INITIALIZATION ============
    async function main() {
      try {
        if (!attemptId) {
          document.getElementById('results-list').innerHTML = `
            <div class="error-message">
              <i class="fas fa-exclamation-circle"></i>
              No attempt ID found. Please return to exam and try again.
            </div>
          `;
          updateScoreCard({ obtained: 0, total: 0, graded: 0, pending: 0, percent: 0, avgScore: "0%", scoreDisplay: "0/0" });
          return;
        }

        console.log("Starting main initialization with attemptId:", attemptId);
        const attempt = await fetchTheoryAttempt(attemptId);
        const scores = await renderTheoryResults(attempt);
        updateScoreCard(scores);

      } catch (err) {
        console.error("Main error:", err);
        document.getElementById('results-list').innerHTML = `
          <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            Error loading results: ${err.message}
          </div>
        `;
        updateScoreCard({ obtained: 0, total: 0, graded: 0, pending: 0, percent: 0, avgScore: "0%", scoreDisplay: "0/0" });
      }
    }

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', main);

    // ============ PDF DOWNLOAD ============
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('download-pdf-btn');
      if (!btn) return;

      btn.onclick = async function() {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner" style="animation: spin 1s linear infinite; margin-right: 0.5rem;"></i>Generating...';

        const reportMain = document.querySelector('.report-wrapper');
        
        if (window.MathJax && MathJax.typesetPromise) {
          try {
            await MathJax.typesetPromise();
            await new Promise(r => setTimeout(r, 200));
          } catch (err) {
            console.warn("MathJax error:", err && err.message);
          }
        }

        try {
          const canvas = await html2canvas(reportMain, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#fff",
            logging: false,
            allowTaint: true,
            windowHeight: reportMain.scrollHeight
          });

          const imgData = canvas.toDataURL("image/png");
          const pdf = new jsPDF('p', 'mm', 'a4');
          const pageHeight = 295;
          let position = 0;

          const pageWidth = pdf.internal.pageSize.getWidth();
          const imgHeight = (canvas.height * pageWidth) / canvas.width;
          let heightLeft = imgHeight;

          while (heightLeft >= 0) {
            pdf.addImage(imgData, 'PNG', 0, position, pageWidth, imgHeight);
            heightLeft -= pageHeight;
            position = heightLeft - imgHeight;
            if (heightLeft > 0) {
              pdf.addPage();
            }
          }

          pdf.save('theory-exam-report.pdf');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-download"></i> Download PDF';
        } catch (err) {
          console.error("PDF error:", err);
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-download"></i> Download PDF';
          alert('Error generating PDF: ' + err.message);
        }
      };
    });
</script>
</body>
</html>
